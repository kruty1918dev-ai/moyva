<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moyva — Документація</title>
<style>
/* ── Reset & Base ──────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fafbff;--bg-card:#fff;--text:#1c1c2e;--text-muted:#5a5f7a;--text-dim:#8890a8;
  --accent:#6366f1;--accent-light:#818cf8;--accent-bg:rgba(99,102,241,.06);--accent-bg2:rgba(99,102,241,.12);
  --border:#e5e7ef;--border-light:#f0f1f7;
  --sidebar-bg:#111827;--sidebar-text:#d1d5db;--sidebar-hover:#1f2937;--sidebar-active:rgba(99,102,241,.15);--sidebar-border:#1f2937;
  --code-bg:#f3f4f9;--code-color:#6d28d9;
  --pre-bg:#0f172a;--pre-border:#1e293b;
  --tag-tutorial:#10b981;--tag-guide:#f59e0b;--tag-ref:#6366f1;--tag-step:#ec4899;--tag-signal:#8b5cf6;--tag-node:#0ea5e9;
  --radius:10px;--radius-sm:6px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.08);
  --transition-fast:.15s ease;--transition:.25s ease;--transition-slow:.4s cubic-bezier(.4,0,.2,1);
}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.7;color:var(--text);background:var(--bg);display:flex;min-height:100vh;overflow-x:hidden}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes slideDown{from{opacity:0;max-height:0}to{opacity:1;max-height:2000px}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ── Progress bar ──────────────────────────────────────────────── */
#progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light));z-index:100;transition:width .15s ease;border-radius:0 2px 2px 0;box-shadow:0 0 8px rgba(99,102,241,.4)}

/* ── Sidebar ──────────────────────────────────────────────────── */
#sidebar{width:280px;background:var(--sidebar-bg);color:var(--sidebar-text);display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;overflow-y:auto;overflow-x:hidden;border-right:1px solid var(--sidebar-border);z-index:20;transition:transform var(--transition-slow)}
#sidebar::-webkit-scrollbar{width:4px}
#sidebar::-webkit-scrollbar-thumb{background:#374151;border-radius:4px}
.sb-header{padding:20px 18px 16px;border-bottom:1px solid var(--sidebar-border)}
.sb-brand{display:flex;align-items:center;gap:10px;margin-bottom:4px}
.sb-logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#a855f7);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;letter-spacing:.5px;flex-shrink:0}
.sb-title{font-size:1.1rem;font-weight:700;color:#f9fafb;letter-spacing:.03em}
.sb-subtitle{font-size:.72rem;color:#6b7280;padding-left:42px;margin-top:-2px}
.sb-search{padding:12px 14px;border-bottom:1px solid var(--sidebar-border)}
#search-input{width:100%;padding:8px 12px 8px 34px;background:#1f2937;border:1px solid #374151;border-radius:8px;color:#e5e7eb;font-size:.82rem;outline:none;transition:all var(--transition-fast)}
#search-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(99,102,241,.15)}
#search-input::placeholder{color:#6b7280}
.search-wrap{position:relative}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.82rem;color:#6b7280;pointer-events:none}

/* ── Nav ──────────────────────────────────────────────────────── */
nav{flex:1;padding:8px 0}
nav ul{list-style:none;padding:0;margin:0}

.nav-section{display:flex;align-items:center;gap:8px;padding:10px 16px 4px;cursor:pointer;user-select:none;transition:all var(--transition-fast)}
.nav-section:hover{background:var(--sidebar-hover)}
.nav-section-icon{font-size:1rem;flex-shrink:0;width:22px;text-align:center}
.nav-section-title{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:#9ca3af;flex:1}
.nav-section-arrow{font-size:.55rem;color:#6b7280;transition:transform var(--transition);display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px}
.nav-section.open .nav-section-arrow{transform:rotate(90deg)}

.nav-pages{overflow:hidden;max-height:0;transition:max-height var(--transition-slow),opacity .3s ease;opacity:0}
.nav-pages.open{max-height:3000px;opacity:1}

.nav-link{display:flex;align-items:center;gap:6px;padding:5px 16px 5px 46px;color:#9ca3af;text-decoration:none;font-size:.82rem;transition:all var(--transition-fast);border-left:2px solid transparent;position:relative}
.nav-link:hover{color:#e5e7eb;background:var(--sidebar-hover);text-decoration:none}
.nav-link.active{color:var(--accent-light);background:var(--sidebar-active);border-left-color:var(--accent)}
.nav-tag{font-size:.55rem;padding:1px 5px;border-radius:3px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;flex-shrink:0;line-height:1.4}
.nav-tag-tutorial{background:rgba(16,185,129,.15);color:#34d399}
.nav-tag-guide{background:rgba(245,158,11,.15);color:#fbbf24}
.nav-tag-reference{background:rgba(99,102,241,.15);color:#a5b4fc}
.nav-tag-step-by-step{background:rgba(236,72,153,.15);color:#f472b6}
.nav-tag-signal{background:rgba(139,92,246,.15);color:#c4b5fd}
.nav-tag-node{background:rgba(14,165,233,.15);color:#38bdf8}

/* ── Mobile ──────────────────────────────────────────────────── */
#menu-toggle{display:none;position:fixed;top:12px;left:12px;z-index:30;background:var(--sidebar-bg);border:1px solid #374151;border-radius:10px;padding:10px 12px;cursor:pointer;color:#e5e7eb;font-size:1.1rem;line-height:1;box-shadow:var(--shadow-lg);transition:all var(--transition-fast)}
#menu-toggle:hover{background:#1f2937}
#sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:15;backdrop-filter:blur(2px);opacity:0;transition:opacity .3s ease}
#sidebar-overlay.open{display:block;opacity:1}

/* ── Main content ─────────────────────────────────────────────── */
#main{margin-left:280px;flex:1;min-height:100vh}
.page-wrapper{padding:32px 48px 80px;max-width:900px;margin:0 auto}
.page{display:none;animation:fadeIn .4s ease}
.page.active{display:block}

/* ── Typography ───────────────────────────────────────────────── */
.page h1{font-size:1.9rem;font-weight:800;color:var(--text);margin-bottom:.5rem;line-height:1.3;letter-spacing:-.02em}
.page h1::after{content:'';display:block;width:60px;height:3px;background:linear-gradient(90deg,var(--accent),var(--accent-light));border-radius:3px;margin-top:12px}
.page h2{font-size:1.25rem;font-weight:700;color:var(--text);margin:2.5rem 0 .6rem;padding-bottom:.3rem;border-bottom:1px solid var(--border-light);scroll-margin-top:24px}
.page h3{font-size:1.05rem;font-weight:600;color:#2d2d44;margin:1.5rem 0 .4rem;scroll-margin-top:24px}
.page h4{font-size:.92rem;font-weight:600;color:#3d3d5c;margin:1.2rem 0 .3rem}
.page p{color:var(--text-muted);margin-bottom:.8rem;font-size:.92rem}
.page ul,.page ol{margin:.5rem 0 1rem 1.4rem}
.page li{color:var(--text-muted);margin-bottom:.25rem;font-size:.92rem}
.page li::marker{color:var(--accent)}
a{color:var(--accent);text-decoration:none;transition:color var(--transition-fast)}
a:hover{color:var(--accent-light);text-decoration:underline}

/* ── Code ─────────────────────────────────────────────────────── */
code{font-family:'JetBrains Mono','SF Mono',Consolas,monospace;font-size:.8em;background:var(--code-bg);color:var(--code-color);padding:2px 6px;border-radius:4px;overflow-wrap:break-word}
pre{background:var(--pre-bg);border:1px solid var(--pre-border);border-radius:var(--radius);padding:1.2rem 1.4rem;overflow-x:auto;margin:1rem 0;position:relative;box-shadow:var(--shadow)}
pre code{background:none;color:#e2e8f0;padding:0;font-size:.82rem;line-height:1.7}
pre::before{content:'';position:absolute;top:12px;left:14px;width:8px;height:8px;border-radius:50%;background:#ef4444;box-shadow:16px 0 0 #f59e0b,32px 0 0 #22c55e}

/* ── Tables ───────────────────────────────────────────────────── */
.table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;margin:1.2rem 0;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow)}
.table-wrap table{margin:0;border:none;min-width:480px}
table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.875rem}
th{background:var(--accent-bg);border:1px solid var(--border);padding:10px 14px;text-align:left;font-weight:600;color:var(--text);font-size:.82rem}
td{border:1px solid var(--border);padding:9px 14px;vertical-align:top;color:var(--text-muted)}
tr:nth-child(even) td{background:#fafafe}
tr:hover td{background:var(--accent-bg)}

/* ── Blockquotes ──────────────────────────────────────────────── */
blockquote{border-left:3px solid var(--accent);background:var(--accent-bg);padding:.8rem 1.2rem;margin:1rem 0;border-radius:0 var(--radius) var(--radius) 0;color:#3b4252;font-size:.9rem}
hr{border:none;border-top:1px solid var(--border);margin:2rem 0}

/* ── Collapsible details (from markdown) ──────────────────────── */
.page details{border:1px solid var(--border);border-radius:var(--radius);margin:.8rem 0;overflow:hidden;transition:all var(--transition)}
.page details[open]{box-shadow:var(--shadow)}
.page summary{padding:10px 16px;background:var(--accent-bg);cursor:pointer;font-weight:600;font-size:.9rem;color:var(--text);transition:all var(--transition-fast);list-style:none;display:flex;align-items:center;gap:8px}
.page summary::-webkit-details-marker{display:none}
.page summary::before{content:'▸';display:inline-block;transition:transform var(--transition);color:var(--accent);font-size:.9em;width:12px}
.page details[open]>summary::before{transform:rotate(90deg)}
.page summary:hover{background:var(--accent-bg2)}
.page details>:not(summary){padding:0 16px;animation:fadeIn .3s ease}
.page details>p:last-child,.page details>ul:last-child,.page details>ol:last-child{padding-bottom:12px}

/* ── Table of Contents ────────────────────────────────────────── */
#toc{position:fixed;right:24px;top:80px;width:220px;max-height:calc(100vh - 120px);overflow-y:auto;font-size:.78rem;z-index:10}
#toc::-webkit-scrollbar{width:2px}
#toc::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.toc-title{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);margin-bottom:8px;padding-left:12px}
.toc-list{list-style:none;padding:0;border-left:1px solid var(--border)}
.toc-item{padding:3px 0 3px 12px;border-left:2px solid transparent;margin-left:-1px;transition:all var(--transition-fast)}
.toc-item a{color:var(--text-dim);text-decoration:none;transition:color var(--transition-fast);display:block;line-height:1.4}
.toc-item:hover a{color:var(--accent)}
.toc-item.active{border-left-color:var(--accent)}
.toc-item.active a{color:var(--accent);font-weight:500}
.toc-h3{padding-left:24px}

/* ── Back to top ──────────────────────────────────────────────── */
#back-top{position:fixed;bottom:28px;right:28px;width:40px;height:40px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-lg);opacity:0;transform:translateY(20px);transition:all var(--transition);z-index:10;pointer-events:none}
#back-top.visible{opacity:1;transform:none;pointer-events:auto}
#back-top:hover{background:var(--accent-light);transform:translateY(-2px)}

/* ── Breadcrumb ───────────────────────────────────────────────── */
.breadcrumb{display:flex;align-items:center;gap:6px;font-size:.78rem;color:var(--text-dim);margin-bottom:16px;flex-wrap:wrap}
.breadcrumb a{color:var(--text-dim);transition:color var(--transition-fast)}
.breadcrumb a:hover{color:var(--accent);text-decoration:none}
.breadcrumb .sep{color:var(--border)}
.breadcrumb .current{color:var(--text-muted);font-weight:500}

/* ── Page tag badges ──────────────────────────────────────────── */
.page-tag{display:inline-flex;align-items:center;gap:4px;font-size:.72rem;padding:3px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px}
.page-tag-tutorial{background:rgba(16,185,129,.1);color:var(--tag-tutorial);border:1px solid rgba(16,185,129,.2)}
.page-tag-guide{background:rgba(245,158,11,.1);color:var(--tag-guide);border:1px solid rgba(245,158,11,.2)}
.page-tag-step-by-step{background:rgba(236,72,153,.1);color:var(--tag-step);border:1px solid rgba(236,72,153,.2)}
.page-tag-reference{background:rgba(99,102,241,.1);color:var(--tag-ref);border:1px solid rgba(99,102,241,.2)}
.page-tag-signal{background:rgba(139,92,246,.1);color:var(--tag-signal);border:1px solid rgba(139,92,246,.2)}
.page-tag-node{background:rgba(14,165,233,.1);color:var(--tag-node);border:1px solid rgba(14,165,233,.2)}

/* ── Mermaid diagrams ─────────────────────────────────────────── */
.mermaid{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin:1rem 0;text-align:center;box-shadow:var(--shadow)}

/* ── Search results highlight ─────────────────────────────────── */
.search-match{background:rgba(99,102,241,.15);padding:1px 2px;border-radius:2px}
.no-results{padding:12px 16px;font-size:.82rem;color:#6b7280;font-style:italic}

/* ── Responsive — tablet ──────────────────────────────────────── */
@media(max-width:1280px){
  #toc{display:none}
}
@media(max-width:1024px){
  .page-wrapper{padding:28px 24px 60px}
}

/* ── Responsive — mobile ──────────────────────────────────────── */
@media(max-width:768px){
  body{display:block}
  #menu-toggle{display:flex;align-items:center;justify-content:center}
  #sidebar{transform:translateX(-100%);width:85%;max-width:320px;position:fixed}
  #sidebar.open{transform:translateX(0)}
  #main{margin-left:0}
  .page-wrapper{padding:56px 16px 40px;max-width:100%}
  .page h1{font-size:1.5rem}
  .page h2{font-size:1.1rem}
  pre{font-size:.78rem;padding:.8rem 1rem}
  th,td{padding:6px 8px;font-size:.8rem}
  #back-top{bottom:16px;right:16px;width:36px;height:36px;font-size:.95rem}
}
</style>
<!-- Google Fonts: Inter + JetBrains Mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
<!-- Progress bar -->
<div id="progress-bar" style="width:0%"></div>

<!-- Mobile hamburger -->
<button id="menu-toggle" aria-label="Меню" onclick="toggleSidebar()">☰</button>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<!-- Sidebar -->
<aside id="sidebar">
  <div class="sb-header">
    <div class="sb-brand">
      <div class="sb-logo-icon">M</div>
      <div class="sb-title">Moyva</div>
    </div>
    <div class="sb-subtitle">Unity 2D · Покрокова стратегія</div>
  </div>
  <div class="sb-search">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="search" id="search-input" placeholder="Пошук..." autocomplete="off" spellcheck="false">
    </div>
  </div>
  <nav id="nav"></nav>
</aside>

<!-- Main area -->
<main id="main">
  <div class="page-wrapper" id="page-wrapper"></div>
</main>

<!-- Table of Contents -->
<div id="toc"></div>

<!-- Back to top -->
<button id="back-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   Moyva Documentation — SPA Engine
   ═══════════════════════════════════════════════════════════════════════════ */

var PAGES = {};
var SECTIONS = [];
var currentRoute = '';

// ── Route helpers ──────────────────────────────────────────────────────────
function routeFromPath(path) {
  if (/^README\.md$/i.test(path)) return 'home';
  var r = path.replace(/\.md$/i, '');
  if (/\/README$/i.test(r)) r = r.replace(/\/README$/i, '');
  return r.toLowerCase();
}

function elIdFromRoute(route) {
  return 'page-' + route.replace(/[\/\.]/g, '-');
}

// ── Markdown renderer ──────────────────────────────────────────────────────
var Md = {
  esc: function(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  },
  fixLink: function(href) {
    if (!href) return '#';
    if (/^https?:|^mailto:|^#/.test(href)) return href;
    if (!/\.md/i.test(href)) return href;
    var clean = href.replace(/#.*$/, '').replace(/^(\.\.\/)+|^\.\//, '');
    if (/^README\.md$/i.test(clean)) return '#home';
    var route = routeFromPath(clean);
    if (PAGES[route]) return '#' + route;
    var keys = Object.keys(PAGES);
    for (var i = 0; i < keys.length; i++) {
      if (keys[i].split('/').pop() === route.split('/').pop() && keys[i].endsWith(route)) {
        return '#' + keys[i];
      }
    }
    return href;
  },
  inline: function(s) {
    var cc = [], self = this;
    s = s.replace(/`([^`\n]+)`/g, function(_, c) { cc.push('<code>' + self.esc(c) + '</code>'); return '\x01' + (cc.length - 1) + '\x01'; });
    s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
    s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
    s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, t, h) { return '<a href="' + self.fixLink(h) + '">' + t + '</a>'; });
    s = s.replace(/\\([*\[\]\\`])/g, '$1');
    cc.forEach(function(c, i) { s = s.split('\x01' + i + '\x01').join(c); });
    return s;
  },
  table: function(rows) {
    var self = this;
    var data = rows.filter(function(r) { return !/^\|[\s:\-|]+\|/.test(r); });
    var html = '<table>';
    data.forEach(function(row, ri) {
      var tag = ri === 0 ? 'th' : 'td';
      var cells = row.split('|').slice(1, -1).map(function(c) { return c.trim(); });
      html += '<tr>' + cells.map(function(c) { return '<' + tag + '>' + self.inline(c) + '</' + tag + '>'; }).join('') + '</tr>';
    });
    return '<div class="table-wrap">' + html + '</table></div>';
  },
  render: function(text) {
    var self = this, cb = [];
    // Handle mermaid blocks specially
    text = text.replace(/```mermaid\n?([\s\S]*?)```/g, function(_, code) {
      cb.push('<div class="mermaid">' + code.trim() + '</div>');
      return '\x02' + (cb.length - 1) + '\x03';
    });
    text = text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_, lang, code) {
      cb.push('<pre><code>' + self.esc(code.replace(/\n$/, '')) + '</code></pre>');
      return '\x02' + (cb.length - 1) + '\x03';
    });
    // Handle HTML details blocks from markdown
    var detailsOpen = [];
    text = text.replace(/<details>/gi, function() {
      detailsOpen.push(true);
      return '\x04DETAILS_OPEN\x04';
    });
    text = text.replace(/<\/details>/gi, function() {
      detailsOpen.pop();
      return '\x04DETAILS_CLOSE\x04';
    });
    text = text.replace(/<summary>([^<]*)<\/summary>/gi, function(_, content) {
      return '\x04SUMMARY_' + content.trim() + '\x04';
    });

    var lines = text.split('\n'), out = [], i = 0;
    while (i < lines.length) {
      var l = lines[i];
      if (/^\x02\d+\x03$/.test(l)) { out.push(l); i++; continue; }
      // Details / Summary
      if (l.indexOf('\x04DETAILS_OPEN\x04') !== -1) { out.push('<details>'); i++; continue; }
      if (l.indexOf('\x04DETAILS_CLOSE\x04') !== -1) { out.push('</details>'); i++; continue; }
      var sm = l.match(/\x04SUMMARY_(.+?)\x04/);
      if (sm) { out.push('<summary>' + self.inline(sm[1]) + '</summary>'); i++; continue; }

      var hm = l.match(/^(#{1,4}) (.+)/);
      if (hm) {
        var lv = hm[1].length, raw = hm[2].trim();
        var id = 'h-' + raw.toLowerCase().replace(/[^\wа-яіїєa-z0-9]/gi, '-').replace(/-+/g, '-').replace(/^-|-$/g, '');
        out.push('<h' + lv + ' id="' + id + '">' + self.inline(raw) + '</h' + lv + '>');
        i++; continue;
      }
      if (/^-{3,}\s*$/.test(l)) { out.push('<hr>'); i++; continue; }
      if (l.startsWith('> ')) {
        var bq = [];
        while (i < lines.length && lines[i].startsWith('> ')) { bq.push(lines[i].slice(2)); i++; }
        out.push('<blockquote>' + self.inline(bq.join(' ')) + '</blockquote>');
        continue;
      }
      if (l.startsWith('|') && i + 1 < lines.length && /^\|[\s:\-|]+\|/.test(lines[i + 1])) {
        var rows = [];
        while (i < lines.length && lines[i].startsWith('|')) { rows.push(lines[i]); i++; }
        out.push(self.table(rows)); continue;
      }
      if (/^[ \t]*[-*+] /.test(l)) {
        var items = [];
        while (i < lines.length && /^[ \t]*[-*+] /.test(lines[i])) { items.push(lines[i].replace(/^[ \t]*[-*+] /, '')); i++; }
        out.push('<ul>' + items.map(function(it) { return '<li>' + self.inline(it) + '</li>'; }).join('') + '</ul>');
        continue;
      }
      if (/^\d+\. /.test(l)) {
        var oit = [];
        while (i < lines.length && /^\d+\. /.test(lines[i])) { oit.push(lines[i].replace(/^\d+\. /, '')); i++; }
        out.push('<ol>' + oit.map(function(it) { return '<li>' + self.inline(it) + '</li>'; }).join('') + '</ol>');
        continue;
      }
      if (!l.trim()) { i++; continue; }
      out.push('<p>' + self.inline(l) + '</p>');
      i++;
    }
    var html = out.join('\n');
    cb.forEach(function(b, idx) { html = html.split('\x02' + idx + '\x03').join(b); });
    return html;
  }
};

// ── Build navigation from sections manifest ────────────────────────────────
function buildSite(manifest) {
  var wrapper = document.getElementById('page-wrapper');
  var navEl = document.getElementById('nav');
  var ul = document.createElement('ul');

  if (!manifest || !Array.isArray(manifest.sections) || manifest.sections.length === 0) {
    wrapper.innerHTML = '<p style="color:#ef4444;padding:40px">Маніфест порожній або не містить секцій.</p>';
    return;
  }

  SECTIONS = manifest.sections;

  manifest.sections.forEach(function(section, si) {
    if (!section || !Array.isArray(section.pages)) return;

    // Register all pages in this section
    section.pages.forEach(function(item) {
      if (!item || !item.path) return;
      var route = routeFromPath(item.path);
      var elId = elIdFromRoute(route);
      PAGES[route] = {
        el: elId, file: item.path, loaded: false, title: item.title || item.path,
        tag: item.tag || null, section: section.title || '', sectionIcon: section.icon || '📄'
      };
      var div = document.createElement('div');
      div.id = elId;
      div.className = 'page';
      wrapper.appendChild(div);
    });

    // Build nav section header
    var sectionLi = document.createElement('li');
    var sectionHeader = document.createElement('div');
    sectionHeader.className = 'nav-section' + (si === 0 ? ' open' : '');
    sectionHeader.innerHTML =
      '<span class="nav-section-icon">' + (section.icon || '📄') + '</span>' +
      '<span class="nav-section-title">' + (section.title || section.id || 'Без назви') + '</span>' +
      '<span class="nav-section-arrow">▶</span>';
    sectionLi.appendChild(sectionHeader);

    // Build pages list (hidden by default except first section)
    var pagesUl = document.createElement('ul');
    pagesUl.className = 'nav-pages' + (si === 0 ? ' open' : '');

    section.pages.forEach(function(item) {
      if (!item || !item.path) return;
      var route = routeFromPath(item.path);
      var li = document.createElement('li');
      li.dataset.page = route;
      li.dataset.section = section.id || '';
      var a = document.createElement('a');
      a.href = '#' + route;
      a.className = 'nav-link';
      a.textContent = item.title || item.path;
      if (item.tag) {
        var tagSpan = document.createElement('span');
        tagSpan.className = 'nav-tag nav-tag-' + item.tag.replace(/\s+/g, '-');
        tagSpan.textContent = item.tag;
        a.appendChild(tagSpan);
      }
      li.appendChild(a);
      pagesUl.appendChild(li);
    });

    sectionLi.appendChild(pagesUl);
    ul.appendChild(sectionLi);

    // Toggle section expand/collapse
    (function(header, pages) {
      header.addEventListener('click', function() {
        header.classList.toggle('open');
        pages.classList.toggle('open');
      });
    })(sectionHeader, pagesUl);
  });

  navEl.appendChild(ul);
}

// ── Build Table of Contents for current page ───────────────────────────────
function buildToc(route) {
  var tocEl = document.getElementById('toc');
  var page = PAGES[route];
  if (!page) { tocEl.innerHTML = ''; return; }
  var pageEl = document.getElementById(page.el);
  if (!pageEl) { tocEl.innerHTML = ''; return; }
  var headings = pageEl.querySelectorAll('h2, h3');
  if (headings.length < 2) { tocEl.innerHTML = ''; return; }

  var html = '<div class="toc-title">Зміст</div><ul class="toc-list">';
  headings.forEach(function(h) {
    var level = h.tagName === 'H3' ? ' toc-h3' : '';
    html += '<li class="toc-item' + level + '"><a href="#' + h.id + '">' + h.textContent + '</a></li>';
  });
  html += '</ul>';
  tocEl.innerHTML = html;
}

// ── Expand the nav section containing the given route ──────────────────────
function expandSectionFor(route) {
  var page = PAGES[route];
  if (!page) return;
  var items = document.querySelectorAll('#nav li[data-page]');
  items.forEach(function(li) {
    if (li.dataset.page !== route) return;
    var parent = li.closest('.nav-pages');
    if (parent && !parent.classList.contains('open')) {
      parent.classList.add('open');
      var header = parent.previousElementSibling;
      if (header) header.classList.add('open');
    }
  });
}

// ── Page loader ────────────────────────────────────────────────────────────
function loadPage(key, cb) {
  var p = PAGES[key];
  if (!p) { cb && cb(); return; }
  var el = document.getElementById(p.el);
  if (p.loaded) { cb && cb(); return; }
  el.innerHTML = '<p style="color:var(--text-dim);font-style:italic">Завантаження…</p>';
  fetch(p.file)
    .then(function(r) { return r.ok ? r.text() : Promise.reject('HTTP ' + r.status); })
    .then(function(text) {
      var tagHtml = '';
      if (p.tag) {
        var tagLabels = {
          'tutorial': '📚 Туторіал', 'guide': '📘 Гайд', 'step-by-step': '👣 Крок за кроком',
          'reference': '📖 Довідник', 'signal': '📡 Сигнал', 'node': '🔗 Нод'
        };
        tagHtml = '<div class="page-tag page-tag-' + p.tag.replace(/\s+/g, '-') + '">' + (tagLabels[p.tag] || p.tag) + '</div>';
      }
      var breadcrumb = '<div class="breadcrumb">' +
        '<a href="#home">Головна</a><span class="sep">›</span>' +
        '<span class="current">' + p.section + '</span></div>';
      el.innerHTML = breadcrumb + tagHtml + Md.render(text);
      p.loaded = true;
      cb && cb();
    })
    .catch(function(err) {
      el.innerHTML = '<p style="color:#ef4444;padding:20px;background:rgba(239,68,68,.05);border-radius:8px;">Не вдалося завантажити: ' + err + '</p>';
    });
}

function preloadAll() {
  Object.keys(PAGES).forEach(function(key) { loadPage(key); });
}

// ── Router ─────────────────────────────────────────────────────────────────
function navigate(hash) {
  hash = hash || 'home';
  if (hash.startsWith('#')) hash = hash.slice(1);
  if (!PAGES[hash]) hash = 'home';
  if (!PAGES[hash]) {
    // Even 'home' doesn't exist — pick the first available page
    var keys = Object.keys(PAGES);
    if (keys.length === 0) return;
    hash = keys[0];
  }
  currentRoute = hash;

  // Hide all pages, show current
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var page = PAGES[hash];
  if (!page) return;
  var el = document.getElementById(page.el);
  if (el) el.classList.add('active');

  loadPage(hash, function() {
    buildToc(hash);
    // Try to render mermaid diagrams
    if (typeof mermaid !== 'undefined') {
      try { mermaid.init(undefined, el.querySelectorAll('.mermaid')); } catch(e) {}
    }
  });

  // Update active nav link
  document.querySelectorAll('.nav-link').forEach(function(a) {
    var h = a.getAttribute('href');
    a.classList.toggle('active', h === '#' + hash);
  });

  // Expand the section
  expandSectionFor(hash);

  // Scroll to top
  window.scrollTo(0, 0);

  // Update title
  document.title = (page.title || 'Документація') + ' — Moyva';
}

window.addEventListener('hashchange', function() { navigate(location.hash.slice(1)); });

// ── Progress bar & back-to-top ─────────────────────────────────────────────
window.addEventListener('scroll', function() {
  var h = document.documentElement;
  var scrollTop = h.scrollTop || document.body.scrollTop;
  var scrollHeight = h.scrollHeight - h.clientHeight;
  var pct = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('back-top').classList.toggle('visible', scrollTop > 300);
});

// ── Search ─────────────────────────────────────────────────────────────────
function initSearch() {
  var input = document.getElementById('search-input');
  input.addEventListener('input', function() {
    var q = this.value.toLowerCase().trim();
    var navItems = document.querySelectorAll('#nav li[data-page]');
    var sections = document.querySelectorAll('#nav > ul > li');
    var first = null;

    if (!q) {
      // Reset: show all items
      navItems.forEach(function(li) { li.style.display = ''; });
      sections.forEach(function(s) { s.style.display = ''; });
      return;
    }

    // Search through nav items
    navItems.forEach(function(li) {
      var key = li.dataset.page;
      var p = PAGES[key];
      var pageEl = p ? document.getElementById(p.el) : null;
      var text = pageEl ? pageEl.textContent.toLowerCase() : '';
      var label = (p ? p.title : '').toLowerCase();
      var match = label.includes(q) || text.includes(q);
      li.style.display = match ? '' : 'none';
      if (match && !first) first = key;
    });

    // Show sections that have visible children
    sections.forEach(function(s) {
      var visibleChildren = s.querySelectorAll('li[data-page]:not([style*="display: none"])');
      s.style.display = visibleChildren.length > 0 ? '' : 'none';
      if (visibleChildren.length > 0) {
        var pages = s.querySelector('.nav-pages');
        var header = s.querySelector('.nav-section');
        if (pages) pages.classList.add('open');
        if (header) header.classList.add('open');
      }
    });

    if (first) navigate(first);
  });

  // Keyboard shortcut: Ctrl+K or / to focus search
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey && e.key === 'k') || (e.key === '/' && document.activeElement.tagName !== 'INPUT')) {
      e.preventDefault();
      input.focus();
    }
    if (e.key === 'Escape' && document.activeElement === input) {
      input.value = '';
      input.dispatchEvent(new Event('input'));
      input.blur();
    }
  });
}

// ── Mobile sidebar ─────────────────────────────────────────────────────────
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
}
window.addEventListener('hashchange', function() {
  if (window.innerWidth <= 768) closeSidebar();
});

// ── Manifest normalisation ──────────────────────────────────────────────────
// If a stale cache or legacy workflow produced a flat array instead of the
// expected {sections:[…]} object, convert it on-the-fly so the rest of
// the code always works with the canonical format.
function normaliseManifest(data) {
  if (!data) return null;
  // Already correct format
  if (data.sections && Array.isArray(data.sections)) return data;
  // Legacy flat-array format: [{path,title},…]
  if (Array.isArray(data) && data.length > 0 && data[0].path) {
    return {
      sections: [{
        id: 'all', title: 'Усі сторінки', icon: '📄',
        pages: data.map(function(p) { return { path: p.path, title: p.title }; })
      }]
    };
  }
  return null;
}

// ── Init ───────────────────────────────────────────────────────────────────
fetch('pages.json?v=' + Date.now())
  .then(function(r) {
    if (!r.ok) return Promise.reject('HTTP ' + r.status + ' при завантаженні pages.json');
    return r.json();
  })
  .then(function(raw) {
    var manifest = normaliseManifest(raw);
    if (!manifest) {
      var detail = 'Отримано: ' + (typeof raw) +
        (Array.isArray(raw) ? ' (масив, ' + raw.length + ' ел.)' : '') +
        (raw && typeof raw === 'object' ? ', ключі: ' + Object.keys(raw).join(', ') : '');
      return Promise.reject('pages.json має невірну структуру. ' + detail);
    }
    buildSite(manifest);
    navigate(location.hash.slice(1) || 'home');
    preloadAll();
    initSearch();
  })
  .catch(function(err) {
    var msg = (err && err.message) ? err.message : String(err);
    document.getElementById('page-wrapper').innerHTML =
      '<div style="padding:40px;max-width:600px;margin:auto">' +
        '<h2 style="color:#ef4444;margin-bottom:12px">⚠️ Помилка завантаження документації</h2>' +
        '<p style="color:#64748b;margin-bottom:16px">' + msg + '</p>' +
        '<p style="color:#64748b;font-size:.9rem">Спробуйте <a href="javascript:location.reload(true)" style="color:var(--accent)">оновити сторінку</a> ' +
        'або очистити кеш браузера (Ctrl+Shift+R).</p>' +
      '</div>';
    console.error('[Moyva Docs] Init error:', err);
  });
</script>
