<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Moyva — Документація</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans',sans-serif;line-height:1.6;color:#1c1c27;background:#fff;display:flex;min-height:100vh}
#sidebar{width:268px;background:#13141f;color:#c9d1d9;display:flex;flex-direction:column;position:fixed;inset:0 auto 0 0;overflow-y:auto;border-right:1px solid #21262d;z-index:10}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid #21262d}
.sb-logo .title{font-size:1.1rem;font-weight:700;color:#7c9ef8;letter-spacing:.04em}
.sb-logo .sub{font-size:.7rem;color:#6e7681;margin-top:2px}
.sb-search{padding:10px 12px;border-bottom:1px solid #21262d}
#search-input{width:100%;padding:7px 10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#c9d1d9;font-size:.82rem;outline:none;transition:border-color .15s}
#search-input:focus{border-color:#7c9ef8}
#search-input::placeholder{color:#484f58}
nav ul{list-style:none;padding:0;margin:0}
.nav-section{padding:12px 14px 3px;font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.12em;color:#484f58;list-style:none}
.nav-divider{border:none;border-top:1px solid #21262d;margin:6px 0}
nav a{display:block;padding:5px 14px;color:#8b949e;text-decoration:none;font-size:.84rem;transition:color .1s,background .1s;border-left:2px solid transparent}
nav a:hover{color:#e6edf3;background:#1c2128}
nav a.active{color:#7c9ef8;background:#1c2128;border-left-color:#7c9ef8}
.nav-sys a{padding-left:22px}
.nav-subsys a{padding-left:32px;font-size:.8rem;color:#6e7681}
.nav-subsys a:hover{color:#c9d1d9;background:#1c2128}
.nav-subsys a.active{color:#7c9ef8;background:#1c2128;border-left-color:#7c9ef8}
#main{margin-left:268px;padding:40px 48px;width:100%;max-width:1100px}
.page{display:none;max-width:820px}
.page.active{display:block}
.page h1{font-size:1.875rem;font-weight:700;color:#1c1c27;margin-bottom:.75rem;padding-bottom:.5rem;border-bottom:1px solid #e2e8f0}
.page h2{font-size:1.25rem;font-weight:600;color:#1c1c27;margin:2rem 0 .5rem;padding-bottom:.25rem;border-bottom:1px solid #f0f0f7}
.page h3{font-size:1rem;font-weight:600;color:#2d2d44;margin:1.25rem 0 .25rem}
.page h4{font-size:.9rem;font-weight:600;color:#2d2d44;margin:1rem 0 .2rem}
.page p{color:#374151;margin-bottom:.75rem}
.page ul,.page ol{margin:.4rem 0 .75rem 1.4rem}
.page li{color:#374151;margin-bottom:.2rem}
a{color:#5c7ef8;text-decoration:none}
a:hover{text-decoration:underline;color:#3b5ccc}
code{font-family:'SFMono-Regular',Consolas,'Liberation Mono',monospace;font-size:.82em;background:#eef2ff;color:#5c3bbd;padding:2px 5px;border-radius:4px}
pre{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:1rem 1.25rem;overflow-x:auto;margin:1rem 0}
pre code{background:none;color:#c9d1d9;padding:0;font-size:.83rem;line-height:1.6}
table{width:100%;border-collapse:collapse;margin:1rem 0;font-size:.875rem}
th{background:#f8f9ff;border:1px solid #e2e8f0;padding:8px 12px;text-align:left;font-weight:600;color:#1c1c27;font-size:.82rem}
td{border:1px solid #e2e8f0;padding:7px 12px;vertical-align:top;color:#374151}
tr:nth-child(even) td{background:#fafafe}
blockquote{border-left:3px solid #7c9ef8;background:#eef2ff;padding:.6rem 1rem;margin:.75rem 0;border-radius:0 6px 6px 0;color:#3b4252;font-size:.9rem}
hr{border:none;border-top:1px solid #e2e8f0;margin:1.75rem 0}
.no-results{padding:10px 14px;font-size:.82rem;color:#484f58;font-style:italic}
@media(max-width:768px){body{flex-direction:column}#sidebar{width:100%;position:static;border-right:none;border-bottom:1px solid #21262d}#main{margin-left:0;padding:20px}}
</style>
</head>
<body>
<aside id="sidebar">
  <div class="sb-logo">
    <div class="title">Moyva</div>
    <div class="sub">Unity 2D · Документація</div>
  </div>
  <div class="sb-search">
    <input type="search" id="search-input" placeholder="🔍 Пошук по документації..." autocomplete="off">
  </div>
  <nav id="nav"></nav>
</aside>

<main id="main"></main>

<script>
// ── Helpers ────────────────────────────────────────────────────────────────
var PAGES = {};

var SECTION_LABELS = {
  'systems': 'Системи',
  'standarts': 'Стандарти'
};

function routeFromPath(path) {
  if (/^README\.md$/i.test(path)) return 'home';
  var r = path.replace(/\.md$/i, '');
  if (/\/README$/i.test(r)) r = r.replace(/\/README$/i, '');
  return r.toLowerCase();
}

function elIdFromRoute(route) {
  return 'page-' + route.replace(/\//g, '-');
}

function navLabel(route, title) {
  var parts = route.split('/');
  if (parts.length >= 3) {
    var segs = title.split(/\s*[—:]\s*/);
    if (segs.length > 1) return segs.slice(1).join(' — ');
  }
  return title.split(/\s*[—:]\s*/)[0];
}

// ── Markdown renderer ──────────────────────────────────────────────────────
var Md = {
  esc: function(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  },
  fixLink: function(href){
    if(!href) return '#';
    if(/^https?:|^mailto:|^#/.test(href)) return href;
    if(!/\.md/i.test(href)) return href;
    var clean = href.replace(/#.*$/, '').replace(/^(\.\.\/)+|^\.\//, '');
    if(/^README\.md$/i.test(clean)) return '#home';
    var route = routeFromPath(clean);
    if(PAGES[route]) return '#' + route;
    if(PAGES['systems/' + route]) return '#systems/' + route;
    if(PAGES['standarts/' + route]) return '#standarts/' + route;
    return href;
  },
  inline: function(s){
    var cc=[], self=this;
    s = s.replace(/`([^`\n]+)`/g, function(_,c){ cc.push('<code>'+self.esc(c)+'</code>'); return '\x01'+(cc.length-1)+'\x01'; });
    s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    s = s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_,t,h){ return '<a href="'+self.fixLink(h)+'">'+t+'</a>'; });
    s = s.replace(/\\([*\[\]\\`])/g,'$1');
    cc.forEach(function(c,i){ s=s.split('\x01'+i+'\x01').join(c); });
    return s;
  },
  table: function(rows){
    var self=this;
    var data=rows.filter(function(r){ return !/^\|[\s:\-|]+\|/.test(r); });
    var html='<table>';
    data.forEach(function(row,ri){
      var tag=ri===0?'th':'td';
      var cells=row.split('|').slice(1,-1).map(function(c){ return c.trim(); });
      html+='<tr>'+cells.map(function(c){ return '<'+tag+'>'+self.inline(c)+'</'+tag+'>'; }).join('')+'</tr>';
    });
    return html+'</table>';
  },
  render: function(text){
    var self=this, cb=[];
    text=text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,lang,code){
      cb.push('<pre><code>'+self.esc(code.replace(/\n$/,''))+'</code></pre>');
      return '\x02'+(cb.length-1)+'\x03';
    });
    var lines=text.split('\n'), out=[], i=0;
    while(i<lines.length){
      var l=lines[i];
      if(/^\x02\d+\x03$/.test(l)){ out.push(l); i++; continue; }
      var hm=l.match(/^(#{1,4}) (.+)/);
      if(hm){
        var lv=hm[1].length, raw=hm[2].trim();
        var id='h-'+raw.toLowerCase().replace(/[^\wа-яіїєa-z0-9]/gi,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
        out.push('<h'+lv+' id="'+id+'">'+self.inline(raw)+'</h'+lv+'>');
        i++; continue;
      }
      if(/^-{3,}\s*$/.test(l)){ out.push('<hr>'); i++; continue; }
      if(l.startsWith('> ')){
        var bq=[];
        while(i<lines.length && lines[i].startsWith('> ')){ bq.push(lines[i].slice(2)); i++; }
        out.push('<blockquote>'+self.inline(bq.join(' '))+'</blockquote>');
        continue;
      }
      if(l.startsWith('|') && i+1<lines.length && /^\|[\s:\-|]+\|/.test(lines[i+1])){
        var rows=[];
        while(i<lines.length && lines[i].startsWith('|')){ rows.push(lines[i]); i++; }
        out.push(self.table(rows)); continue;
      }
      if(/^[ \t]*[-*+] /.test(l)){
        var items=[];
        while(i<lines.length && /^[ \t]*[-*+] /.test(lines[i])){ items.push(lines[i].replace(/^[ \t]*[-*+] /,'')); i++; }
        out.push('<ul>'+items.map(function(it){ return '<li>'+self.inline(it)+'</li>'; }).join('')+'</ul>');
        continue;
      }
      if(/^\d+\. /.test(l)){
        var oit=[];
        while(i<lines.length && /^\d+\. /.test(lines[i])){ oit.push(lines[i].replace(/^\d+\. /,'')); i++; }
        out.push('<ol>'+oit.map(function(it){ return '<li>'+self.inline(it)+'</li>'; }).join('')+'</ol>');
        continue;
      }
      if(!l.trim()){ i++; continue; }
      out.push('<p>'+self.inline(l)+'</p>');
      i++;
    }
    var html=out.join('\n');
    cb.forEach(function(b,idx){ html=html.split('\x02'+idx+'\x03').join(b); });
    return html;
  }
};

// ── Build site from manifest ───────────────────────────────────────────────
function buildSite(manifest) {
  var mainEl = document.getElementById('main');
  var navEl  = document.getElementById('nav');

  manifest.forEach(function(item) {
    var route = routeFromPath(item.path);
    var elId  = elIdFromRoute(route);
    PAGES[route] = { el: elId, file: item.path, loaded: false, title: item.title };
    var div = document.createElement('div');
    div.id = elId;
    div.className = 'page';
    mainEl.appendChild(div);
  });

  var ul = document.createElement('ul');

  if (PAGES['home']) {
    var homeLi = document.createElement('li');
    homeLi.dataset.page = 'home';
    homeLi.innerHTML = '<a href="#home">Головна</a>';
    ul.appendChild(homeLi);
  }

  var sections = {};
  Object.keys(PAGES).forEach(function(route) {
    if (route === 'home') return;
    var sec = route.split('/')[0];
    if (!sections[sec]) sections[sec] = [];
    sections[sec].push(route);
  });

  Object.keys(sections).sort().forEach(function(sec) {
    var headerLi = document.createElement('li');
    headerLi.className = 'nav-section';
    headerLi.textContent = SECTION_LABELS[sec] || sec.charAt(0).toUpperCase() + sec.slice(1);
    ul.appendChild(headerLi);

    var routes = sections[sec].sort();

    var subDirParents = {};
    routes.forEach(function(r) {
      routes.forEach(function(o) {
        if (o !== r && o.startsWith(r + '/')) subDirParents[r] = true;
      });
    });

    routes.forEach(function(route) {
      var depth = route.split('/').length - 1;
      var isSubItem = depth >= 2;

      var li = document.createElement('li');
      li.dataset.page = route;
      li.className = isSubItem ? 'nav-subsys' : 'nav-sys';

      var label = navLabel(route, PAGES[route].title);
      if (isSubItem) label = '↳ ' + label;
      li.innerHTML = '<a href="#' + route + '">' + Md.esc(label) + '</a>';
      ul.appendChild(li);
    });

    var hr = document.createElement('hr');
    hr.className = 'nav-divider';
    ul.appendChild(hr);
  });

  navEl.appendChild(ul);
}

// ── Page loader (fetch .md on demand, cache after first load) ──────────────
function loadPage(key, cb) {
  var p = PAGES[key];
  if (!p) { cb && cb(); return; }
  var el = document.getElementById(p.el);
  if (p.loaded) { cb && cb(); return; }
  el.innerHTML = '<p style="color:#8b949e;font-style:italic">Завантаження…</p>';
  fetch(p.file)
    .then(function(r) { return r.ok ? r.text() : Promise.reject('HTTP ' + r.status); })
    .then(function(text) {
      el.innerHTML = Md.render(text);
      p.loaded = true;
      cb && cb();
    })
    .catch(function(err) {
      el.innerHTML = '<p style="color:#e05050">Не вдалося завантажити документ: ' + err + '</p>';
    });
}

function preloadAll() {
  Object.keys(PAGES).forEach(function(key) { loadPage(key); });
}

// ── Router ─────────────────────────────────────────────────────────────────
function navigate(hash) {
  hash = hash || 'home';
  if (hash.startsWith('#')) hash = hash.slice(1);
  if (!PAGES[hash]) hash = 'home';
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  var el = document.getElementById(PAGES[hash].el);
  if (el) el.classList.add('active');
  loadPage(hash);
  document.querySelectorAll('nav a').forEach(function(a) {
    var h = a.getAttribute('href');
    a.classList.toggle('active', h === '#' + hash);
  });
  document.getElementById('main').scrollTop = 0;
  window.scrollTo(0, 0);
}

window.addEventListener('hashchange', function() { navigate(location.hash.slice(1)); });

// ── Init: fetch manifest, build site, start router ─────────────────────────
fetch('pages.json')
  .then(function(r) { return r.ok ? r.json() : Promise.reject('HTTP ' + r.status); })
  .then(function(manifest) {
    buildSite(manifest);
    navigate(location.hash.slice(1) || 'home');
    preloadAll();
    document.getElementById('search-input').addEventListener('input', function() {
      var q = this.value.toLowerCase().trim();
      var items = document.querySelectorAll('#nav li[data-page]');
      var first = null;
      items.forEach(function(li) {
        var key = li.dataset.page;
        var el = document.getElementById(PAGES[key] ? PAGES[key].el : '');
        var text = el ? el.textContent.toLowerCase() : '';
        var label = li.querySelector('a').textContent.toLowerCase();
        var match = !q || label.includes(q) || text.includes(q);
        li.style.display = match ? '' : 'none';
        if (match && !first && q) first = key;
      });
      if (first) navigate(first);
    });
  })
  .catch(function(err) {
    document.getElementById('main').innerHTML =
      '<p style="color:#e05050;padding:40px">Не вдалося завантажити маніфест документації: ' + err + '</p>';
  });
</script>
</body>
</html>
