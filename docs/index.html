# Moyva — Документація проекту

## Загальний опис

**Moyva** — це покрокова стратегічна гра (Unity 2D), побудована на архітектурі **Dependency Injection** (Zenject) і принципах модульного дизайну. Гра містить процедурно згенерований тайловий світ, юнітів із системою витривалості, алгоритм пошуку шляху A\* і керування камерою.

---

## Архітектурні принципи

| Принцип | Деталі |
|---|---|
| **DI-контейнер** | [Zenject](https://github.com/modesttree/Zenject) — всі залежності прив'язані через `MonoInstaller` |
| **Розділення API/Runtime** | Кожна фіча містить папки `API/` (інтерфейси, DTO) та `Runtime/` (реалізація + Installer) |
| **Signal Bus** | Між-системна комунікація через `SignalBus` (подієва модель) |
| **Async/Await** | Рух юнітів і анімації використовують `Task` + `CancellationToken` |

---

## Системи та модулі

| Система | Короткий опис |
|---|---|
| [**Grid**](#systems/grid) | Керування тайловою сіткою |
| [**Units**](#systems/units) | Фабрика, сервіс та рух юнітів |
| [**Interactions**](#systems/interactions) | Обробка кліків по тайлах |
| [**Pathfinding**](#systems/pathfinding) | Алгоритм A\* пошуку шляху |
| [**Animations**](#systems/animations) | Плавна анімація руху |
| [**Camera**](#systems/camera) | Рух, зум і фокус камери |
| [**Signals**](#systems/signals) | Усі сигнали / події SignalBus |
| [**Generator**](#systems/generator) | Процедурна генерація карти |
| [**ObjectsMap**](#systems/objects-map) | Єдине джерело правди про зайнятість позицій |
| [**Visuals**](#systems/visuals) | Візуальне відображення тайлів |
| [**Bootstrap**](#systems/bootstrap) | Стартова ініціалізація сцени |

---

## Стандарти

| [**TDD**](#standarts/tdd) | Технічний стандарт модульної архітектури (Zenject + asmdef) |

---

## Потік даних

```
[Гравець клікає на тайл]
        │
        ▼
  TileView.OnMouseDown()
  → SignalBus.Fire(TileClickedSignal)
        │
        ▼
  TileInteractionService.OnTileClicked()
  → вибір юніта АБО наказ на рух
        │
        ▼
  UnitMovementService.MoveUnitAsync()
  → Pathfinder.FindPath()          (A*)
  → MovementAnimationService       (Task/lerp)
  → SignalBus.Fire(UnitMovedSignal) (UnitService списує стаміну)
        │
        ▼
  GridService.OccupyTile / VacateTile
  → SignalBus.Fire(OnTileChanged)
        │
        ▼
  TileView.OnTileChanged()         (оновлення кольору)
```

# Animations — Система анімацій руху

← [Назад до README](#home)

---

## Призначення

Система **Animations** відповідає за плавне візуальне переміщення ігрових об'єктів (юнітів) вздовж заданого шляху. Вона є чистою анімаційною службою — не знає нічого про юнітів або сітку, лише переміщує `Transform` між точками.

---

## Як працює внутрішньо

1. Отримує `Transform` цільового об'єкта та список `Vector2Int` — координат шляху.
2. Перебирає шлях по одному кроку. Перед кожним кроком:
   - Викликає делегат `CanPerformStep(nextPos)` — якщо повертає `false`, рух зупиняється (наприклад, не вистачає стаміни).
3. Для кожного кроку виконує лінійну інтерполяцію (`Lerp`) позиції протягом `MoveDurationPerTile` секунд через `await Task.Yield()`.
4. Після завершення кроку: викликає `OnStepCompleted(nextPos)` (там надсилається `UnitMovedSignal`).
5. Між кроками — `Task.Delay(DelayOnTile)` для природного ритму.
6. Весь цикл реагує на `CancellationToken` — гравець або сервіс може перервати рух у будь-який момент.

---

## Публічний API

### Інтерфейс `IMovementAnimationService`

```csharp
namespace Kruty1918.Moyva.Animations.API
{
    public interface IMovementAnimationService
    {
        Task MoveAlongPathAsync(
            Transform                  target,
            IReadOnlyList<Vector2Int>  path,
            PathAnimationSettings      settings,
            CancellationToken          cancellationToken = default);
    }
}
```

### Структура `PathAnimationSettings`

```csharp
[Serializable]
public struct PathAnimationSettings
{
    public float MoveDurationPerTile;
    public float DelayOnTile;
    public Action<Vector2Int> OnStepCompleted;
    public Func<Vector2Int, bool> CanPerformStep;

    public static PathAnimationSettings Default => new PathAnimationSettings
    {
        MoveDurationPerTile = 0.3f,
        DelayOnTile         = 0.05f
    };
}
```

---

## Вхід / Вихід

| Метод | Вхід | Вихід |
|---|---|---|
| `MoveAlongPathAsync` | `Transform`, `IReadOnlyList<Vector2Int>`, `PathAnimationSettings`, `CancellationToken` | `Task` (завершується після останнього кроку або відміни) |

---

## Залежності

Система **не має зовнішніх залежностей** від інших модулів Moyva. Вона працює лише з вбудованими типами Unity (`Transform`, `Vector2Int`, `Time.deltaTime`).

---

## Реєстрація в Zenject (`AnimationsInstaller`)

```csharp
public class AnimationsInstaller : MonoInstaller
{
    public override void InstallBindings()
    {
        Container.Bind<IMovementAnimationService>()
            .To<MovementAnimationService>()
            .AsSingle();
    }
}
```

---

## Приклади використання

### Базове використання

```csharp
[Inject] private IMovementAnimationService _animationService;

var settings = new PathAnimationSettings
{
    MoveDurationPerTile = 0.25f,
    DelayOnTile         = 0.05f,
    OnStepCompleted     = pos => Debug.Log($"Крок завершено: {pos}"),
    CanPerformStep      = pos => true
};

await _animationService.MoveAlongPathAsync(unitTransform, path, settings, cancellationToken);
```

### Реальний приклад — `UnitMovementService.cs`

```csharp
var settings = config.AnimationSettings;

settings.CanPerformStep = nextPos =>
    !_gridService.IsTileOccupied(nextPos) || nextPos == targetPosition;

settings.OnStepCompleted = nextPos =>
{
    float cost = _tileSettings.GetTileWeight(_gridService.GetTileData(nextPos).TileTypeId);
    _signalBus.Fire(new UnitMovedSignal
    {
        UnitId      = unitId,
        NewPosition = nextPos,
        Cost        = cost
    });
};

await _animationService.MoveAlongPathAsync(
    unitObj.transform, path, settings, linkedCts.Token);
```

### Зупинка анімації ззовні

```csharp
var cts = new CancellationTokenSource();
var task = _animationService.MoveAlongPathAsync(t, path, settings, cts.Token);

await Task.Delay(1000);
cts.Cancel();
```

---

## Пов'язані системи

- [Units](#systems/units) — `UnitMovementService` викликає анімацію
- [Signals](#systems/signals) — `UnitMovedSignal` надсилається з `OnStepCompleted`
- [Pathfinding](#systems/pathfinding) — будує шлях, який передається до анімації

# Bootstrap — Система ініціалізації сцени

← [Назад до README](#home)

---

## Призначення

Система **Bootstrap** є точкою входу гри. Вона ініціалізує Zenject DI-контейнер сцени та запускає тестовий спавн юнітів одразу після завантаження.

---

## Компоненти

| Клас | Роль |
|---|---|
| `BootstrapInstaller` | `MonoInstaller` — реєструє початкові сервіси в DI-контейнері |
| `TestUnitSpawner` | `IInitializable` — тестовий клас для перевірки спавну юнітів |

---

## Як працює внутрішньо

1. **`BootstrapInstaller`** реєструє `TestUnitSpawner` через `BindInterfacesTo<TestUnitSpawner>().AsSingle().NonLazy()`.
2. Zenject автоматично викликає `Initialize()` одразу після побудови контейнера.
3. **`TestUnitSpawner.Initialize()`** викликає `IUnitFactory.CreateUnit(...)` для спавну тестових юнітів у задані позиції.

> **Примітка:** `TestUnitSpawner` — це тимчасовий клас для розробки/тестування. У продакшні його замінює реальна система завантаження рівнів або ігровий менеджер.

---

## Публічний API

`TestUnitSpawner` не має публічного API — він є `internal sealed` і спілкується лише через `IUnitFactory`.

---

## Реєстрація в Zenject (`BootstrapInstaller`)

```csharp
public class BootstrapInstaller : MonoInstaller
{
    public override void InstallBindings()
    {
        Container.BindInterfacesTo<TestUnitSpawner>()
            .AsSingle()
            .NonLazy();
    }
}
```

---

## Приклади використання

### Тестовий спавн (реальний код з проекту)

```csharp
public void Initialize()
{
    Debug.Log("[Bootstrap] Початок тестового спавну юнітів...");

    _unitFactory.CreateUnit("warrior", new Vector2Int(5, 5));
    _unitFactory.CreateUnit("warrior", new Vector2Int(7, 3));
    _unitFactory.CreateUnit("warrior", new Vector2Int(2, 8));

    Debug.Log("[Bootstrap] Тестові юніти створені.");
}
```

### Як розширити Bootstrap для продакшну

```csharp
public class GameInitializer : IInitializable
{
    private readonly IMapInstantiator _mapInstantiator;
    private readonly IUnitFactory    _unitFactory;

    public void Initialize()
    {
        _mapInstantiator.BuildWorld();
    }
}
```

---

## Залежності

| Залежність | Причина |
|---|---|
| [`IUnitFactory`](#systems/units) | Створення тестових юнітів при старті |

---

## Пов'язані системи

- [Units](#systems/units) — `IUnitFactory` для спавну
- [Generator](#systems/generator) — може бути ініційований з Bootstrap
</textarea>

# Camera — Система керування камерою

← [Назад до README](#home)

---

## Призначення

Система **Camera** забезпечує повне керування камерою гравця: плавне переміщення по карті, зум (наближення/віддалення) і автофокус на об'єкт. Реалізована через три незалежних сервіси + контролер вводу.

---

## Компоненти системи

| Клас / Інтерфейс | Роль |
|---|---|
| `ICameraMovement` / `CameraMovement` | Переміщення камери (панорамування) |
| `ICameraZoom` / `CameraZoom` | Зум камери (ортографічний або perspective) |
| `ICameraFocused` / `CameraFocused` | Форсований фокус на `Transform` |
| `CameraPlayerController` | Зчитує ввід гравця (Input System) і викликає сервіси |
| `CameraSettingsSO` | ScriptableObject з усіма параметрами камери |

---

## Як працює внутрішньо

### Переміщення (`CameraMovement`)

- На кожен `LateTick()` камера плавно рухається до `_targetPosition` через `Vector3.SmoothDamp`.
- `MoveCamera(delta)` перераховує піксельну дельту мишки/дотику у worldspace-одиниці: `unitsPerPixel = (orthographicSize * 2) / Screen.height`.
- Після `ForceMoveCameraToPosition` вмикається таймер `_forceBlockTimer`, який блокує ввід гравця на 1.5 с.

### Зум (`CameraZoom`)

- Підтримує обидва режими: `orthographic` (2D) та `perspective` (3D).
- `ZoomCamera(delta)` коригує `_targetZoom` у межах `[minZoom, maxZoom]` з `CameraSettingsSO`.
- На `LateTick()` використовується `Mathf.SmoothDamp` до `_targetZoom`.

### Фокус (`CameraFocused`)

- `Focus(Transform target)` викликає `ForceMoveCameraToPosition` і `ForceZoomCamera` зі середнім значенням зуму.

### Контролер гравця (`CameraPlayerController`)

- Читає `InputActionAsset` з map `"Player"`, actions `"Move"` і `"Zoom"`.
- На кожен `Tick()` передає вектор руху і дельту зуму відповідним сервісам.
- Реалізує `IDisposable` для вимкнення actions при знищенні.

---

# Generator — Система процедурної генерації карти

← [Назад до README](#home)

---

## Призначення

Система **Generator** відповідає за процедурну генерацію тайлового ігрового світу. Вона реалізує конвеєр (pipeline) із декількох незалежних стадій: шум → висоти → біоми → особливості (річки) → WFC-полірування → візуальна побудова.

---

## Конвеєр генерації

```
INoiseProvider
  └─► GenerateNoiseMap()          → float[,] heightMap

IVirtualHeightMapGenerator
  └─► GenerateVirtualHeightMap()  → string[,] (за висотами з HeightMapSettings)

IBiomeResolver
  └─► ResolveBiomes()             → string[,] biomeMap (з урахуванням вологості)

IMapFeatureGenerator[] (кожен по черзі)
  ├─► RiverFeatureGenerator       → прокладає річки по heightMap
  └─► WaterPostProcessor          → постобробка водних тайлів

IWFCService
  └─► Apply()                     → WFC-полірування переходів між тайлами

IMapInstantiator (MapVisualInstantiator)
  └─► BuildWorld()                → спавн GameObject-ів по biomeMap
```

---

# Grid — Система тайлової сітки

← [Назад до README](#home)

---

## Призначення

Система **Grid** відповідає за зберігання і керування двовимірною тайловою картою гри. Вона є центральним сховищем стану кожного тайлу: чи зайнятий він, яким юнітом, який тип тайлу (ID для пошуку ваги руху). Майже всі інші системи залежать від неї.

---

## Як працює внутрішньо

1. При ініціалізації `GridService` створює двовимірний масив `TileData[width, height]`.
2. Кожен `TileData` зберігає: прапор `IsOccupied`, ідентифікатор окупанта `OccupantId` і тип тайлу `TileTypeId`.
3. Після будь-якої зміни тайлу (`OccupyTile` / `VacateTile` / `SetTileData`) сервіс надсилає сигнал `OnTileChanged` через `SignalBus`.
4. `TileSettingsService` завантажує ваги руху тайлів із `TileRegistrySO` у словник для O(1)-доступу.

---

        int GridHeight { get; }

    }
}

# Interactions — Система взаємодії з тайлами

← [Назад до README](#home)

---

## Призначення

Система **Interactions** є «посередником» між гравцем (клік миші / дотик) і ігровою логікою. Вона отримує сигнал `TileClickedSignal`, визначає намір гравця (вибрати юніта або наказати рух) і делегує виконання системі юнітів.

---

## Як працює внутрішньо

### Двокроковий механізм вибору

| Крок | Стан `_selectedUnitId` | Дія |
|---|---|---|
| **1-й клік** (на зайнятий тайл) | `null` → `"warrior_01"` | Запам'ятовує ID вибраного юніта |
| **2-й клік** (на будь-який тайл) | `"warrior_01"` → `null` | Відправляє команду руху |

### Потік виконання

```
TileClickedSignal
    │
    ▼
TileInteractionService.OnTileClicked()
    │
    ├─ [немає виділеного юніта + тайл зайнятий]
    │       → _selectedUnitId = signal.OccupantId
    │
    └─ [є виділений юніт]
            → CancelMovement()
            → UnitMovementService.MoveUnitAsync(...)
```

- Кожен новий наказ руху скасовує попередній через `CancellationTokenSource`.
- Сервіс реалізує `IInitializable` та `IDisposable` — підписка / відписка відбуваються автоматично через Zenject.

---

# Pathfinding — Система пошуку шляху

← [Назад до README](#home)

---

## Призначення

Система **Pathfinding** реалізує алгоритм **A\*** для пошуку оптимального маршруту між двома тайлами на сітці. Вона враховує вагу тайлів (стаміну) і перешкоди (зайняті тайли), підтримує 8-напрямковий рух.

---

## Як працює внутрішньо

### Алгоритм A\*

1. **Ініціалізація**: стартовий вузол додається до `openSet`; `gScore[start] = 0`.
2. **Ітерація**: на кожному кроці береться вузол з найменшим `fScore = gScore + heuristic`.
3. **Сусіди**: 8 напрямків (включно з діагоналями). Перевіряється:
   - Чи є тайл у межах сітки (`TryGetTileData`).
   - Чи не зайнятий тайл (окрім старту і фінішу).
4. **Вартість кроку**: `distanceMultiplier × tileWeight`, де:
   - `distanceMultiplier = 1.414` для діагоналей, `1.0` для прямих.
   - `tileWeight` — вага тайлу з `ITileSettingsService`.
5. **Евристика**: октильна відстань (оптимальна для 8-напрямкового руху).
6. **Відновлення шляху**: список `cameFrom` розгортається від фінішу до старту.

### Особливості

- Якщо `start == end` — повертається список з одного елемента.
- Якщо шлях не знайдено — повертається порожній `List<Vector2Int>`.
- Зайняті тайли є непрохідними, **крім** стартового і цільового вузлів.

---

## Публічний API

### Інтерфейс `IPathfinder`

    {
        List<Vector2Int> FindPath(Vector2Int start, Vector2Int end);

    }
}
```

### Знайти шлях між двома точками

### Реальний приклад — `UnitMovementService.cs`

```csharp
if (!_unitService.TryGetUnitPosition(unitId, out var startPosition)) return;

var path = _pathfinder.FindPath(startPosition, targetPosition);
if (path == null || path.Count <= 1) return;

await _animationService.MoveAlongPathAsync(unitObj.transform, path, settings, token);
```

---

## Деталі реалізації евристики

```csharp
private float Heuristic(Vector2Int a, Vector2Int b)
{
    float dx = Mathf.Abs(a.x - b.x);
    float dy = Mathf.Abs(a.y - b.y);
    return (dx + dy) + (1.414f - 2) * Mathf.Min(dx, dy);
}
```

---

- [Units](#systems/units) — використовує `IPathfinder` у `UnitMovementService`
- [Animations](#systems/animations) — отримує готовий шлях для анімації
</textarea>

# Signals — Система сигналів (SignalBus)

← [Назад до README](#home)

---

## Призначення

Система **Signals** забезпечує слабке зв'язування між підсистемами гри через Zenject `SignalBus`. Замість прямих посилань між сервісами, системи надсилають і приймають типізовані сигнали — повідомлення-події.

---

## Як працює внутрішньо

1. `SignalBusInstaller` встановлює Zenject SignalBus і **декларує** кожен сигнал у контейнері.
2. Будь-який сервіс може **підписатися** (`Subscribe<T>`) або **надіслати** (`Fire<T>`) сигнал.
3. Підписка / відписка керується вручну (зазвичай у `IInitializable.Initialize` / `IDisposable.Dispose`).

---

## Усі сигнали проекту

### `TileClickedSignal`

Надсилається: `TileView.OnMouseDown()`
Отримується: `TileInteractionService`

{

}
```

---

### `OnTileChanged`

Отримується: `TileView`

{

}
```

---

### `UnitCreatedSignal`

Надсилається: `UnitFactory.CreateUnit()`
Отримується: `UnitService`

    public GameObject UnitObject;
}
```

---

### `UnitMovedSignal`

Надсилається: `UnitMovementService` (через `OnStepCompleted` анімації)
Отримується: `UnitService`

    public string     UnitId;

    public float      Cost;
}
```

---

### `UnitDestroyedSignal`

{
    public string UnitId;
}
```

---

### `InterruptMovementSignal`

Надсилається: `UnitService` (коли стаміна вичерпана)
Отримується: `UnitMovementService`

{
    public string UnitId;
}

    public string[,] BiomeMap;
    public string[,] ObjectMap;
    public float[,]  HeightMap;
}
```

## Реєстрація в Zenject (`SignalBusInstaller`)

```csharp
public class SignalBusInstaller : MonoInstaller
{
    public override void InstallBindings()
    {
        Zenject.SignalBusInstaller.Install(Container);

        Container.DeclareSignal<TileClickedSignal>();
        Container.DeclareSignal<OnTileChanged>();
        Container.DeclareSignal<UnitCreatedSignal>();
        Container.DeclareSignal<UnitMovedSignal>();
        Container.DeclareSignal<UnitDestroyedSignal>();
        Container.DeclareSignal<InterruptMovementSignal>();
        Container.DeclareSignal<OnGenerationCompleteSignal>();
    }
}
```

---

## Приклади використання

### Надіслати сигнал

```csharp
_signalBus.Fire(new TileClickedSignal { Position = new Vector2Int(3, 4) });
```

### Підписатися на сигнал (у `Initialize`)

```csharp
public void Initialize()
{
    _signalBus.Subscribe<TileClickedSignal>(OnTileClicked);
    _signalBus.Subscribe<InterruptMovementSignal>(OnInterruptRequested);
}
```

### Відписатися (у `Dispose`)

```csharp
public void Dispose()
{
    _signalBus.Unsubscribe<TileClickedSignal>(OnTileClicked);
    _signalBus.Unsubscribe<InterruptMovementSignal>(OnInterruptRequested);
}
```

# Units — Система юнітів

← [Назад до README](#home)

---

## Призначення

Система **Units** відповідає за весь життєвий цикл ігрових юнітів: створення (фабрика), реєстрацію в реєстрі, відстеження позиції й витривалості (стаміни), а також оркестрування асинхронного руху по карті.

---

## Підсистеми

| Клас / Інтерфейс | Роль |
|---|---|
| `IUnitFactory` / `UnitFactory` | Спавн нового юніта на карті |
| `IUnitService` / `UnitService` | Реєстр стану всіх юнітів (стаміна, позиція, GameObject) |
| `IUnitMovementService` / `UnitMovementService` | Координація руху: патфайндинг → анімація → оновлення стану |
| `IUnitClassConfig` / `UnitClassConfigService` | Читання конфігів класів юнітів із `UnitRegistrySO` |
| `UnitRegistrySO` | ScriptableObject-реєстр усіх класів юнітів |

---

## Як працює внутрішньо

### Створення юніта (`UnitFactory`)

1. Знаходить конфіг класу за `typeId` через `IUnitClassConfig`.
2. Спавнить префаб через `DiContainer.InstantiatePrefab`.
3. Генерує унікальний ID: `warrior_01_123456`.
4. Надсилає сигнал `UnitCreatedSignal` — його підхопить `UnitService`.

### Реєстрація стану (`UnitService`)

- Підписується на `UnitCreatedSignal`, `UnitMovedSignal`, `UnitDestroyedSignal`.
- Зберігає стаміну, позицію, тип і `GameObject` у внутрішніх словниках.
- Після `UnitMovedSignal` перевіряє стаміну: якщо не вистачає — надсилає `InterruptMovementSignal`.

### Рух юніта (`UnitMovementService`)

1. Отримує поточну позицію юніта через `IUnitService.TryGetUnitPosition`.
2. Будує шлях через `IPathfinder.FindPath` (A\*).
3. Передає шлях в `IMovementAnimationService.MoveAlongPathAsync` (плавний `Lerp`).
4. На кожному кроці анімація викликає `OnStepCompleted` → надсилається `UnitMovedSignal` → `UnitService` списує стаміну.
5. Слухає `InterruptMovementSignal` для зупинки руху будь-якого юніта.

---

## Публічний API

### `IUnitFactory`

```csharp
public interface IUnitFactory
{
    string CreateUnit(string typeId, Vector2Int gridPosition);
}
```

### `IUnitService`

```csharp
public interface IUnitService
{
    float GetStamina(string unitId);
    bool TryGetUnitPosition(string unitId, out Vector2Int position);
    GameObject GetUnitObject(string unitId);
}
```

### `IUnitMovementService`

```csharp
public interface IUnitMovementService
{
    Task MoveUnitAsync(string unitId, Vector2Int targetPosition, CancellationToken token = default);
}
```

### `UnitClassConfig` (ScriptableObject-елемент)

| Поле | Тип | Опис |
|---|---|---|
| `TypeId` | `string` | Ідентифікатор класу (`"warrior"`) |
| `Prefab` | `GameObject` | Ігровий префаб юніта |
| `BaseStamina` | `float` | Базова стаміна при старті |
| `StaminaRandomRange` | `Vector2` | Діапазон рандомного модифікатора стаміни |
| `AnimationSettings` | `PathAnimationSettings` | Налаштування анімації руху |

---

## Вхід / Вихід

| Метод | Вхід | Вихід |
|---|---|---|
| `CreateUnit` | `string typeId, Vector2Int pos` | `string unitId` |
| `GetStamina` | `string unitId` | `float` |
| `TryGetUnitPosition` | `string unitId` | `bool` + `out Vector2Int` |
| `GetUnitObject` | `string unitId` | `GameObject` (або `null`) |
| `MoveUnitAsync` | `string unitId, Vector2Int target, CancellationToken` | `Task` |

---

## Залежності

| Залежність | Причина |
|---|---|
| [`IGridService`](#systems/grid) | Зайняти / звільнити тайли |
| [`IPathfinder`](#systems/pathfinding) | Пошук шляху перед рухом |
| [`IMovementAnimationService`](#systems/animations) | Плавна анімація кроку |
| [`SignalBus`](#systems/signals) | `UnitCreatedSignal`, `UnitMovedSignal`, `InterruptMovementSignal` |
| `UnitRegistrySO` | Конфіги класів юнітів |

---

## Реєстрація в Zenject (`UnitsInstaller`)

```csharp
public class UnitsInstaller : MonoInstaller
{
    [SerializeField] private UnitRegistrySO _unitRegistry;

    public override void InstallBindings()
    {
        Container.BindInstance(_unitRegistry).AsSingle();

        Container.Bind<IUnitClassConfig>()
            .To<UnitClassConfigService>()
            .AsSingle();

        Container.BindInterfacesAndSelfTo<UnitService>()
            .AsSingle();

        Container.Bind<IUnitFactory>()
            .To<UnitFactory>()
            .AsSingle();

        Container.BindInterfacesAndSelfTo<UnitMovementService>()
            .AsSingle();
    }
}
```

---

## Приклади використання

### Створити юніта

    _unitFactory.CreateUnit("warrior", new Vector2Int(5, 5));
    _unitFactory.CreateUnit("warrior", new Vector2Int(7, 3));
}
```

### Перевірити стаміну

if (stamina <= 0) Debug.Log("Юніт не може рухатись — немає стаміни");

# Visuals — Система візуалізації тайлів

← [Назад до README](#home)

---

## Призначення

Система **Visuals** відповідає за візуальне відображення стану кожного тайлу на екрані. Компонент `TileView` кріпиться до кожного тайлового GameObject і реагує на зміни сітки через `SignalBus`.

---

## Як працює внутрішньо

1. Кожен тайл у сцені має прикріплений компонент `TileView` (MonoBehaviour).
2. При старті `TileView` підписується на `OnTileChanged` через `SignalBus`.
3. Коли надходить сигнал, `TileView` перевіряє: чи стосується зміна **саме цього** тайлу.
4. Якщо так — оновлює `SpriteRenderer.color`:
   - Тайл зайнятий → `_occupiedColor`
   - Тайл вільний → `Color.white`
5. При кліку мишки (`OnMouseDown`) — надсилає `TileClickedSignal` зі своєю позицією.

---

## Публічний API

### Клас `TileView` (MonoBehaviour)

```csharp
namespace Kruty1918.Moyva.Visuals
{
    public class TileView : MonoBehaviour
    {
        public void Setup(Vector2Int position);
        public void Occupy();
        public void Vacate();
    }
}
```

### Поля Inspector

| Поле | Тип | Опис |
|---|---|---|
| `_spriteRenderer` | `SpriteRenderer` | Посилання на рендерер спрайту |
| `_occupiedColor` | `Color` | Колір тайлу, коли на ньому стоїть юніт |

---

## Вхід / Вихід

| Метод | Вхід | Вихід |
|---|---|---|
| `Setup` | `Vector2Int position` | `void` (встановлює `transform.position`) |
| `Occupy` | — | `void` (колір → `_occupiedColor`) |
| `Vacate` | — | `void` (колір → `Color.white`) |
| `OnMouseDown` (Unity) | — | Надсилає `TileClickedSignal` |

---

## Залежності

| Залежність | Причина |
|---|---|
| [`SignalBus`](#systems/signals) | Підписка на `OnTileChanged`, надсилання `TileClickedSignal` |
| [`IGridService`](#systems/grid) | Зчитування `TileData` для визначення стану окупації |

---

## Реєстрація в Zenject

`TileView` є MonoBehaviour і не потребує ручного біндингу. Ін'єкції відбуваються через `[Inject]`-атрибути при спавні через `DiContainer.InstantiatePrefab`.

---

## Приклади використання

### Спавн тайлу з ін'єкцією (Generator)

```csharp
var tileObj = _container.InstantiatePrefab(prefab, worldPosition, Quaternion.identity, null);
var tileView = tileObj.GetComponent<TileView>();
tileView.Setup(gridPosition);
```

### Клік на тайл (ланцюг)

```
TileView.OnMouseDown()
  → SignalBus.Fire(TileClickedSignal)
  → TileInteractionService підхоплює і обробляє
```

---

## Пов'язані системи

- [Signals](#systems/signals) — `OnTileChanged`, `TileClickedSignal`
- [Grid](#systems/grid) — `IGridService` для читання стану
- [Interactions](#systems/interactions) — отримує `TileClickedSignal` від `TileView`
- [Generator](#systems/generator) — спавнить `TileView` при побудові світу
</textarea>

# TDD — Модульна архітектура (Zenject + asmdef)

← [Назад до README](#home)

---

## Мета

TDD фіксує технічний стандарт проєкту: модульність, кордони відповідальності, контроль залежностей і правила реєстрації через DI.

---

## Ключові правила

1. Кожна фіча організована як `API / Runtime / Editor`.
2. Зовнішній код працює з фічею лише через API-контракти.
3. Runtime-реалізації не використовуються напряму між фічами.
4. Залежності збираються через Zenject installer-и.
5. asmdef-залежності мінімальні, без циклів.

---

## Що перевіряти в PR

1. Нова фіча має правильну структуру папок.
2. У коді немає прямої залежності на чужий Runtime.
3. Контракти API задокументовані.
4. Installer явно реєструє потрібні інтерфейси.
5. Документація систем синхронізована з реалізацією.

---

## Повний документ

Детальна версія доступна у файлі `docs/standarts/TDD.md`.
</textarea>

<script>
// ── Markdown renderer ──────────────────────────────────────────────────────
const Md = {
  esc: function(s){
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  },
  fixLink: function(href){
    if(!href) return '#';
    if(/^https?:|^mailto:|^#/.test(href)) return href;
    if(/\.\.\/README\.md|^README\.md$/.test(href)) return '#home';
        var sm = href.match(/(?:\.\.\/standarts\/|standarts\/)([a-z-]+)\.md(?:#.*)?$/i);
        if(sm) return '#standarts/'+sm[1].toLowerCase();
        var m = href.match(/(?:\.\.\/systems\/|systems\/|\.\.\/|\.\/|^)([a-z-]+)\.md(?:#.*)?$/i);
        if(m) return '#systems/'+m[1].toLowerCase();
    return href;
  },
  inline: function(s){
    var cc=[], self=this;
    s = s.replace(/`([^`\n]+)`/g, function(_,c){ cc.push('<code>'+self.esc(c)+'</code>'); return '\x01'+(cc.length-1)+'\x01'; });
    s = s.replace(/\*\*\*(.+?)\*\*\*/g,'<strong><em>$1</em></strong>');
    s = s.replace(/\*\*([^*\n]+)\*\*/g,'<strong>$1</strong>');
    s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_,t,h){ return '<a href="'+self.fixLink(h)+'">'+t+'</a>'; });
    s = s.replace(/\\([*\[\]\\`])/g,'$1');
    cc.forEach(function(c,i){ s=s.split('\x01'+i+'\x01').join(c); });
    return s;
  },
  table: function(rows){
    var self=this;
    var data=rows.filter(function(r){ return !/^\|[\s:\-|]+\|/.test(r); });
    var html='<table>';
    data.forEach(function(row,ri){
      var tag=ri===0?'th':'td';
      var cells=row.split('|').slice(1,-1).map(function(c){ return c.trim(); });
      html+='<tr>'+cells.map(function(c){ return '<'+tag+'>'+self.inline(c)+'</'+tag+'>'; }).join('')+'</tr>';
    });
    return html+'</table>';
  },
  render: function(text){
    var self=this, cb=[];
    text=text.replace(/```(\w*)\n?([\s\S]*?)```/g, function(_,lang,code){
      cb.push('<pre><code>'+self.esc(code.replace(/\n$/,''))+'</code></pre>');
      return '\x02'+(cb.length-1)+'\x03';
    });
    var lines=text.split('\n'), out=[], i=0;
    while(i<lines.length){
      var l=lines[i];
      // code placeholder
      if(/^\x02\d+\x03$/.test(l)){ out.push(l); i++; continue; }
      // heading
      var hm=l.match(/^(#{1,4}) (.+)/);
      if(hm){
        var lv=hm[1].length, raw=hm[2].trim();
        var id='h-'+raw.toLowerCase().replace(/[^\wа-яіїєa-z0-9]/gi,'-').replace(/-+/g,'-').replace(/^-|-$/g,'');
        out.push('<h'+lv+' id="'+id+'">'+self.inline(raw)+'</h'+lv+'>');
        i++; continue;
      }
      // hr
      if(/^-{3,}\s*$/.test(l)){ out.push('<hr>'); i++; continue; }
      // blockquote
      if(l.startsWith('> ')){
        var bq=[];
        while(i<lines.length && lines[i].startsWith('> ')){ bq.push(lines[i].slice(2)); i++; }
        out.push('<blockquote>'+self.inline(bq.join(' '))+'</blockquote>');
        continue;
      }
      // table
      if(l.startsWith('|') && i+1<lines.length && /^\|[\s:\-|]+\|/.test(lines[i+1])){
        var rows=[];
        while(i<lines.length && lines[i].startsWith('|')){ rows.push(lines[i]); i++; }
        out.push(self.table(rows)); continue;
      }
      // ul
      if(/^[ \t]*[-*+] /.test(l)){
        var items=[];
        while(i<lines.length && /^[ \t]*[-*+] /.test(lines[i])){ items.push(lines[i].replace(/^[ \t]*[-*+] /,'')); i++; }
        out.push('<ul>'+items.map(function(it){ return '<li>'+self.inline(it)+'</li>'; }).join('')+'</ul>');
        continue;
      }
      // ol
      if(/^\d+\. /.test(l)){
        var oit=[];
        while(i<lines.length && /^\d+\. /.test(lines[i])){ oit.push(lines[i].replace(/^\d+\. /,'')); i++; }
        out.push('<ol>'+oit.map(function(it){ return '<li>'+self.inline(it)+'</li>'; }).join('')+'</ol>');
        continue;
      }
      // empty
      if(!l.trim()){ i++; continue; }
      // paragraph
      out.push('<p>'+self.inline(l)+'</p>');
      i++;
    }
    var html=out.join('\n');
    cb.forEach(function(b,idx){ html=html.split('\x02'+idx+'\x03').join(b); });
    return html;
  }
};

// ── Page registry ──────────────────────────────────────────────────────────
var PAGES = {
  'home':                  {el:'page-home',            md:'md-home'},
  'systems/animations':    {el:'page-systems-animations',   md:'md-systems-animations'},
  'systems/bootstrap':     {el:'page-systems-bootstrap',    md:'md-systems-bootstrap'},
  'systems/camera':        {el:'page-systems-camera',       md:'md-systems-camera'},
  'systems/generator':     {el:'page-systems-generator',    md:'md-systems-generator'},
  'systems/grid':          {el:'page-systems-grid',         md:'md-systems-grid'},
  'systems/interactions':  {el:'page-systems-interactions', md:'md-systems-interactions'},
  'systems/pathfinding':   {el:'page-systems-pathfinding',  md:'md-systems-pathfinding'},
  'systems/signals':       {el:'page-systems-signals',      md:'md-systems-signals'},
  'systems/units':         {el:'page-systems-units',        md:'md-systems-units'},
    'systems/objects-map':   {el:'page-systems-objects-map',  md:'md-systems-objects-map'},
    'systems/visuals':       {el:'page-systems-visuals',      md:'md-systems-visuals'},
    'standarts/tdd':         {el:'page-standarts-tdd',        md:'md-standarts-tdd'}
};

// Pre-render all pages on load
Object.keys(PAGES).forEach(function(key){
  var p=PAGES[key];
  var ta=document.getElementById(p.md);
  var el=document.getElementById(p.el);
  if(ta && el) el.innerHTML=Md.render(ta.value);
  if(ta) ta.remove();
});

// ── Router ─────────────────────────────────────────────────────────────────
function navigate(hash){
  hash=hash||'home';
  if(hash.startsWith('#')) hash=hash.slice(1);
  if(!PAGES[hash]) hash='home';
  // Show page
  document.querySelectorAll('.page').forEach(function(p){ p.classList.remove('active'); });
  document.getElementById(PAGES[hash].el).classList.add('active');
  // Update nav
  document.querySelectorAll('nav a').forEach(function(a){
    var h=a.getAttribute('href');
    a.classList.toggle('active', h==='#'+hash);
  });
  // Scroll to top
  document.getElementById('main').scrollTop=0;
  window.scrollTo(0,0);
}

window.addEventListener('hashchange', function(){ navigate(location.hash.slice(1)); });
window.addEventListener('load', function(){ navigate(location.hash.slice(1)||'home'); });

// ── Search ─────────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function(){
  var q=this.value.toLowerCase().trim();
  var items=document.querySelectorAll('#nav li[data-page]');
  var first=null;
  items.forEach(function(li){
    var key=li.dataset.page;
    var el=document.getElementById(PAGES[key]?PAGES[key].el:'');
    var text=el?el.textContent.toLowerCase():'';
    var label=li.querySelector('a').textContent.toLowerCase();
    var match=!q||label.includes(q)||text.includes(q);
    li.style.display=match?'':'none';
    if(match&&!first&&q) first=key;
  });
  if(first) navigate(first);
});
</script>
