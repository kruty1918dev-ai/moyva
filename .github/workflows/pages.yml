name: Deploy Documentation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required documentation files
        run: |
          REQUIRED_FILES=(
            "docs/README.md"
            "docs/index.html"
            "docs/standarts/TDD.md"
            "docs/systems/signals.md"
            "docs/systems/interactions.md"
            "docs/systems/objects-map.md"
            "docs/systems/visuals.md"
            "docs/systems/game-mode.md"
            "docs/systems/construction.md"
            "docs/systems/construction-service.md"
            "docs/systems/construction-registry.md"
            "docs/systems/wall-placement.md"
            "docs/systems/screen-to-grid.md"
          )
          MISSING=0
          for f in "${REQUIRED_FILES[@]}"; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "Validation failed: $MISSING required documentation file(s) are missing."
            exit 1
          fi
          echo "All required documentation files are present."

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    # Skip deployments triggered by the AI doc-sync bot commit (those carry [skip ci]).
    # GitHub already suppresses [skip ci] workflows globally, but this guard
    # makes the intent explicit for manual audits.
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
