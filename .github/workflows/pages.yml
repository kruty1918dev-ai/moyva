name: Build Documentation

on:
  push:
    branches:
      - main
      - '**'
    paths:
      - 'docs/**'
  workflow_dispatch:
  delete:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    if: "github.event_name != 'delete' && !contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate core documentation files
        run: |
          MISSING=0
          for f in docs/README.md docs/index.html docs/pages.json; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "Validation failed: $MISSING required file(s) are missing."
            exit 1
          fi
          echo "Core documentation files are present."

      - name: Validate pages.json structure
        run: |
          python3 << 'PYEOF'
          import json, sys, os

          with open('docs/pages.json', encoding='utf-8') as f:
              data = json.load(f)

          if not isinstance(data, dict) or 'sections' not in data:
              print('ERROR: pages.json must be an object with "sections" array.')
              print('       Got:', type(data).__name__, '— keys:', list(data.keys()) if isinstance(data, dict) else 'N/A')
              sys.exit(1)

          sections = data['sections']
          if not isinstance(sections, list) or len(sections) == 0:
              print('ERROR: "sections" must be a non-empty array.')
              sys.exit(1)

          errors = 0
          total_pages = 0
          for i, sec in enumerate(sections):
              if not isinstance(sec, dict):
                  print(f'ERROR: sections[{i}] is not an object')
                  errors += 1
                  continue
              for key in ('id', 'title', 'icon', 'pages'):
                  if key not in sec:
                      print(f'ERROR: sections[{i}] ("{sec.get("id","?")}") missing "{key}"')
                      errors += 1
              if not isinstance(sec.get('pages'), list):
                  print(f'ERROR: sections[{i}].pages is not an array')
                  errors += 1
                  continue
              for j, page in enumerate(sec['pages']):
                  total_pages += 1
                  if 'path' not in page:
                      print(f'ERROR: sections[{i}].pages[{j}] missing "path"')
                      errors += 1
                  elif not os.path.isfile(os.path.join('docs', page['path'])):
                      print(f'WARNING: file not found: docs/{page["path"]}')

          if errors > 0:
              print(f'Validation FAILED with {errors} error(s).')
              sys.exit(1)

          print(f'pages.json OK: {len(sections)} sections, {total_pages} pages.')
          PYEOF

      - name: Setup Pages
        if: github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v4

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

      - name: Compute preview URL
        if: github.ref != 'refs/heads/main'
        id: preview_url
        run: |
          SAFE_BRANCH=$(echo "${GITHUB_REF_NAME}" | tr '[:upper:]' '[:lower:]' | tr '/[:space:]' '--' | tr -cd '[:alnum:]-')
          echo "domain=preview-${SAFE_BRANCH}-moyva.surge.sh" >> "$GITHUB_OUTPUT"

      - name: Deploy preview to Surge
        if: github.ref != 'refs/heads/main'
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npx --yes surge ./docs "${{ steps.preview_url.outputs.domain }}" --token "$SURGE_TOKEN"

      - name: Publish preview summary
        if: always() && github.ref != 'refs/heads/main'
        run: |
          {
            echo "## 📄 Documentation Preview"
            echo ""
            echo "Гілка: \`${GITHUB_REF_NAME}\`"
            echo ""
            echo "🔗 **Live preview:** https://${{ steps.preview_url.outputs.domain }}"
            echo ""
            echo "> Сайт існує лише для цієї гілки і буде видалений разом з нею."
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  cleanup-preview:
    runs-on: ubuntu-latest
    if: github.event_name == 'delete' && github.event.ref_type == 'branch' && github.event.ref != 'main'
    steps:
      - name: Compute preview URL
        id: preview_url
        run: |
          SAFE_BRANCH=$(echo "${{ github.event.ref }}" | tr '[:upper:]' '[:lower:]' | tr '/[:space:]' '--' | tr -cd '[:alnum:]-')
          echo "domain=preview-${SAFE_BRANCH}-moyva.surge.sh" >> "$GITHUB_OUTPUT"

      - name: Teardown Surge preview
        env:
          SURGE_TOKEN: ${{ secrets.SURGE_TOKEN }}
        run: |
          npx --yes surge teardown "${{ steps.preview_url.outputs.domain }}" --token "$SURGE_TOKEN"

      - name: Publish teardown summary
        run: |
          {
            echo "## 🗑️ Preview Removed"
            echo ""
            echo "Гілку \`${{ github.event.ref }}\` видалено — превʼю сайт також прибрано."
            echo ""
            echo "~~https://${{ steps.preview_url.outputs.domain }}~~"
          } >> "$GITHUB_STEP_SUMMARY"
