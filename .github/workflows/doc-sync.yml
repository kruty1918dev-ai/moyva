name: AI Doc Sync & Deploy

# Triggers on every push to main.
# Infinite-loop prevention: GitHub Actions automatically skips ALL workflow
# runs when the head commit message contains "[skip ci]", so the bot commit
# we push here will never re-trigger this workflow.
on:
  push:
    branches: [main]

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Job 1: Detect code changes, run AI check, optionally update docs ───────
  check-and-update:
    name: Check & Update Docs
    runs-on: ubuntu-latest

    # Extra guard: skip if this commit was authored by our own bot
    # (covers edge cases where [skip ci] alone might not be enough)
    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"

    outputs:
      docs_updated: ${{ steps.ai.outputs.docs_updated }}
      code_changed: ${{ steps.changes.outputs.code_changed }}

    steps:
      # ── 1. Checkout with depth 2 so we can diff HEAD vs HEAD~1 ─────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Detect whether any non-docs source files changed ────────────────
      - name: Detect code changes
        id: changes
        run: |
          # Handle first commit gracefully (no parent)
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD)
          else
            CHANGED=$(git show --name-only --pretty=format: HEAD)
          fi

          echo "=== All changed files ==="
          echo "$CHANGED"
          echo ""

          # Anything outside docs/ and .github/ is considered "code"
          CODE_CHANGED=$(echo "$CHANGED" | grep -vE '^(docs/|\.github/)' || true)

          if [ -n "$CODE_CHANGED" ]; then
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            echo "Code files changed:"
            echo "$CODE_CHANGED"
          else
            echo "code_changed=false" >> "$GITHUB_OUTPUT"
            echo "No code files changed."
          fi

      # ── 3. Short-circuit: nothing to do when there are no code changes ──────
      - name: "✅ No code changes — documentation is up to date"
        if: steps.changes.outputs.code_changed == 'false'
        run: |
          echo "No source-code changes detected in this push."
          echo "Documentation is already current. Exiting pipeline — nothing to do."

      # ── 4. Prepare diff and current docs content for the AI ────────────────
      - name: Prepare content for AI analysis
        if: steps.changes.outputs.code_changed == 'true'
        run: |
          # Cap the diff at 15 000 bytes — keeps the request well within the
          # ~128 k-token context window of gpt-4o while leaving plenty of room
          # for the system prompt, current docs, and the model's response.
          if git rev-parse HEAD~1 >/dev/null 2>&1; then
            git diff HEAD~1 HEAD -- ':!docs/' ':!.github/' \
              | head -c 15000 > /tmp/code_diff.txt
          else
            git show HEAD -- ':!docs/' ':!.github/' \
              | head -c 15000 > /tmp/code_diff.txt
          fi
          echo "Code diff size: $(wc -c < /tmp/code_diff.txt) bytes"

          # Collect all Markdown docs into a single file
          > /tmp/docs_content.txt
          for f in docs/README.md docs/systems/*.md; do
            [ -f "$f" ] || continue
            echo "=== FILE: $f ===" >> /tmp/docs_content.txt
            cat "$f"               >> /tmp/docs_content.txt
            printf "\n\n"          >> /tmp/docs_content.txt
          done
          echo "Docs content size: $(wc -c < /tmp/docs_content.txt) bytes"

      # ── 5. Call GitHub Models (gpt-4o) and conditionally write updated docs ─
      - name: AI — Analyze and update documentation
        if: steps.changes.outputs.code_changed == 'true'
        id: ai
        uses: actions/github-script@v7
        env:
          # Uses the automatically-injected GITHUB_TOKEN, which works with
          # GitHub Models for repository owners on a Pro / Pro+ / Team / Enterprise plan.
          # If you receive 401 errors, create a Personal Access Token with the
          # "model" scope, save it as repository secret GH_MODELS_TOKEN, and
          # replace the value below with: ${{ secrets.GH_MODELS_TOKEN }}
          MODELS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          script: |
            const fs   = require('fs');
            const path = require('path');

            // Absolute path of the docs directory inside the workspace.
            // Used for path-traversal protection when writing AI-generated files.
            const WORKSPACE    = process.env.GITHUB_WORKSPACE || process.cwd();
            const DOCS_ABS_DIR = path.resolve(WORKSPACE, 'docs');

            const codeDiff    = fs.readFileSync('/tmp/code_diff.txt',   'utf8');
            const docsContent = fs.readFileSync('/tmp/docs_content.txt','utf8');

            // ── System prompt (Ukrainian, matches project language) ──────────
            const systemPrompt = [
              'Ти — асистент з документації для Unity C# проекту "moyva".',
              'Документація зберігається у docs/systems/*.md і docs/README.md — написана українською мовою у форматі Markdown.',
              '',
              'Твоє завдання:',
              '1. Проаналізувати diff змін у коді (git diff).',
              '2. Перевірити, чи наявна документація точно відображає ці зміни.',
              '3. Якщо документація актуальна — повернути needs_update: false.',
              '4. Якщо документація потребує оновлення — повернути needs_update: true і надати оновлені файли.',
              '',
              'ВІДПОВІДАЙ ВИКЛЮЧНО валідним JSON такого формату:',
              '{',
              '  "needs_update": true | false,',
              '  "reason": "стисле пояснення рішення",',
              '  "files": {',
              '    "docs/systems/filename.md": "повний оновлений Markdown вміст файлу"',
              '  }',
              '}',
              '',
              'Правила:',
              '- Якщо оновлення не потрібне → needs_update: false, files: {}',
              '- Оновлюй лише файли, що безпосередньо стосуються змін у коді',
              '- Зберігай українську мову та наявний стиль/структуру документації',
              "- Шлях файлу ОБОВ'ЯЗКОВО має починатися з \"docs/\"",
            ].join('\n');

            const userMessage =
              `=== GIT DIFF (зміни в коді) ===\n${codeDiff}\n\n` +
              `=== ПОТОЧНА ДОКУМЕНТАЦІЯ ===\n${docsContent}`;

            console.log('Calling GitHub Models API (gpt-4o)…');

            const response = await fetch(
              'https://models.inference.ai.azure.com/chat/completions',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${process.env.MODELS_TOKEN}`,
                },
                body: JSON.stringify({
                  model: 'gpt-4o',
                  messages: [
                    { role: 'system', content: systemPrompt },
                    { role: 'user',   content: userMessage  },
                  ],
                  response_format: { type: 'json_object' },
                  // 8 192 tokens provides ample space for multi-file doc updates
                  max_tokens: 8192,
                  temperature: 0.1,
                }),
              }
            );

            if (!response.ok) {
              const errBody = await response.text();
              core.setFailed(
                `GitHub Models API error ${response.status} ${response.statusText}:\n${errBody}`
              );
              return;
            }

            const data       = await response.json();
            const rawContent = data.choices[0].message.content;
            console.log(`AI response length: ${rawContent.length} chars`);

            let result;
            try {
              result = JSON.parse(rawContent);
            } catch (e) {
              // Log first 800 chars to give enough context without flooding logs
              core.setFailed(
                `Could not parse AI response as JSON:\n${rawContent.substring(0, 800)}`
              );
              return;
            }

            const needsUpdate = Boolean(result.needs_update);
            const reason      = String(result.reason || '');
            console.log(`needs_update : ${needsUpdate}`);
            console.log(`reason       : ${reason}`);

            core.setOutput('needs_update', String(needsUpdate));
            core.setOutput('reason',       reason);

            // Validate that files is a plain object when an update is needed
            const filesObj = (
              needsUpdate &&
              result.files !== null &&
              typeof result.files === 'object' &&
              !Array.isArray(result.files)
            ) ? result.files : {};

            const fileEntries = Object.entries(filesObj);
            if (needsUpdate && fileEntries.length > 0) {
              let filesWritten = 0;
              for (const [filePath, content] of fileEntries) {
                // Resolve to an absolute path and verify it stays inside docs/
                const absTarget = path.resolve(WORKSPACE, filePath);
                if (!absTarget.startsWith(DOCS_ABS_DIR + path.sep) &&
                    absTarget !== DOCS_ABS_DIR) {
                  console.warn(`SKIPPED — path escapes docs/ directory: ${filePath}`);
                  continue;
                }
                const dir = path.dirname(absTarget);
                fs.mkdirSync(dir, { recursive: true });
                fs.writeFileSync(absTarget, String(content), 'utf8');
                console.log(`Written: ${filePath}`);
                filesWritten++;
              }
              core.setOutput('docs_updated', filesWritten > 0 ? 'true' : 'false');
            } else {
              core.setOutput('docs_updated', 'false');
            }

      # ── 6. Report: docs were already up to date ─────────────────────────────
      - name: "✅ Documentation is already up to date — no deployment needed"
        if: >
          steps.changes.outputs.code_changed == 'true' &&
          steps.ai.outputs.needs_update == 'false'
        run: |
          echo "AI confirmed: documentation already reflects all code changes."
          echo "Reason: ${{ steps.ai.outputs.reason }}"
          echo "No deployment triggered."

      # ── 7. Commit the AI-generated doc updates with [skip ci] ───────────────
      - name: Commit updated documentation
        if: steps.ai.outputs.docs_updated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "Nothing staged — skipping commit."
          else
            git commit -m "docs: auto-update documentation to match code changes [skip ci]"
            git push
            echo "Documentation committed and pushed."
          fi

      # ── 8. Upload the (now-updated) docs as a Pages artifact ────────────────
      - name: Upload Pages artifact
        if: steps.ai.outputs.docs_updated == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

  # ── Job 2: Deploy to GitHub Pages (only when docs were updated by AI) ──────
  deploy:
    name: Deploy to GitHub Pages
    needs: check-and-update
    if: needs.check-and-update.outputs.docs_updated == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
