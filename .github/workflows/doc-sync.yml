name: AI Doc Sync & Deploy

# Triggers on every push to main and allows manual runs.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-and-update:
    name: Check & Update Docs
    runs-on: ubuntu-latest

    if: "!contains(github.event.head_commit.message, '[skip ci]') && github.actor != 'github-actions[bot]'"

    env:
      MODELS_API_BASE: https://models.inference.ai.azure.com
      MODEL_ID: gpt-4o

    outputs:
      docs_updated: ${{ steps.ai.outputs.docs_updated }}
      audit_needed: ${{ steps.audit.outputs.audit_needed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Structural doc audit
        id: audit
        run: |
          SCRIPTS_DIR="Assets/Moyva/Scripts/Features"
          DOCS_DIR="docs/systems"

          echo "=== Systems found in code ==="
          MISSING_DOCS=""
          SYSTEMS_LIST=""

          for system_dir in "$SCRIPTS_DIR"/*/; do
            [ -d "$system_dir" ] || continue
            system_name=$(basename "$system_dir")
            SYSTEMS_LIST="$SYSTEMS_LIST $system_name"

            doc_file="$DOCS_DIR/$(echo "$system_name" | tr '[:upper:]' '[:lower:]').md"

            if [ ! -f "$doc_file" ]; then
              echo "  MISSING DOC: $system_name -> $doc_file"
              MISSING_DOCS="$MISSING_DOCS $system_name"
            else
              echo "  OK: $system_name -> $doc_file"
            fi
          done

          echo ""
          echo "Systems in code: $SYSTEMS_LIST"
          echo "Missing docs:    $MISSING_DOCS"

          echo "audit_needed=true" >> "$GITHUB_OUTPUT"
          echo "missing_docs=$MISSING_DOCS" >> "$GITHUB_OUTPUT"

      - name: Collect source code for AI analysis
        if: steps.audit.outputs.audit_needed == 'true'
        env:
          SOURCE_CODE_CAP_BYTES: 60000
        run: |
          SCRIPTS_DIR="Assets/Moyva/Scripts"
          > /tmp/source_code.txt

          find "$SCRIPTS_DIR" \
            -path "$SCRIPTS_DIR/Tests" -prune -o \
            -name "*.cs" -print | sort | while read -r f; do
            echo "=== FILE: $f ===" >> /tmp/source_code.txt
            cat "$f"               >> /tmp/source_code.txt
            printf "\n\n"          >> /tmp/source_code.txt
          done

          truncate -s "$SOURCE_CODE_CAP_BYTES" /tmp/source_code.txt || true
          echo "Source code size: $(wc -c < /tmp/source_code.txt) bytes"

          > /tmp/docs_content.txt
          for f in docs/README.md docs/systems/*.md; do
            [ -f "$f" ] || continue
            echo "=== FILE: $f ===" >> /tmp/docs_content.txt
            cat "$f"               >> /tmp/docs_content.txt
            printf "\n\n"          >> /tmp/docs_content.txt
          done
          echo "Docs content size: $(wc -c < /tmp/docs_content.txt) bytes"

          echo "${{ steps.audit.outputs.missing_docs }}" > /tmp/missing_docs.txt

      - name: Validate MOYVA_TOKEN (GitHub Models) and show sample sizes
        if: steps.audit.outputs.audit_needed == 'true'
        env:
          MODELS_TOKEN: ${{ secrets.MOYVA_TOKEN }}
          MODELS_API_BASE: ${{ env.MODELS_API_BASE }}
        run: |
          echo "Source code bytes: $(wc -c < /tmp/source_code.txt || echo 'no file')"
          echo "Docs content bytes: $(wc -c < /tmp/docs_content.txt || echo 'no file')"
          http_code=$(curl -s -o /tmp/resp -w "%{http_code}" \
            -H "Authorization: Bearer $MODELS_TOKEN" \
            -H "Accept: application/json" \
            "$MODELS_API_BASE/models" || true)
          echo "Models endpoint HTTP status: $http_code"
          head -c 1000 /tmp/resp || true

      - name: AI — Full documentation audit
        if: steps.audit.outputs.audit_needed == 'true'
        id: ai
        uses: actions/github-script@v7
        env:
          MODELS_TOKEN: ${{ secrets.MOYVA_TOKEN }}
          MODELS_API_BASE: ${{ env.MODELS_API_BASE }}
          MODEL_ID: ${{ env.MODEL_ID }}
        with:
          script: |
            const fn = require(`${process.env.GITHUB_WORKSPACE}/.github/scripts/ai-doc-audit.js`);
            await fn({ core, github, context });

      - name: Documentation is fully up to date
        if: steps.ai.outputs.needs_update == 'false'
        run: |
          echo "AI confirmed: all systems are documented and up to date."
          echo "Reason: ${{ steps.ai.outputs.reason }}"

      - name: Commit updated documentation
        if: steps.ai.outputs.docs_updated == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          if git diff --cached --quiet; then
            echo "Nothing staged — skipping commit."
          else
            git commit -m "docs: auto-update documentation to match code changes [skip ci]"
            git push
            echo "Documentation committed and pushed."
          fi

      - name: Upload Pages artifact
        if: steps.ai.outputs.docs_updated == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: './docs'

  deploy:
    name: Deploy to GitHub Pages
    needs: check-and-update
    if: needs.check-and-update.outputs.docs_updated == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4